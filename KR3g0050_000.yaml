body:
  text: 欽定四庫全書子部七御定星厯考原術數類六隂陽五行之屬提要臣等謹案御定星厯考原六卷康熙五十二年聖祖仁皇帝御定初康熙二十二年命廷臣㑹議修輯選擇通書與萬年書一體頒行而二書未能畫一餘相沿舊說亦多未能改正是年因簡命舊臣明於星學數學者在內廷䝉養齊算輯算法樂律諸書乃併取曹振圭厯事明原詔大學士李光地等重為考定以成是編凡分六目一曰象數考原二曰年神方位三曰月事吉神四曰月事凶神五曰日時總類六月用事宜忌每一目為一卷考古者外事用剛日內事用柔日其日以卜不以擇趙岐孟子注天時為孤虛王相則戰國時已漸講之然神煞之說則莫知所起易緯乾鑿度有太乙行九宫法太乙天之貴神也漢志兵家隂陽類亦稱順時而發推刑德隨斗擊因五勝假鬼神而為助又隂陽家類稱出於羲和之官拘者為之則牽于禁忌拘于小數舍人事而任鬼神則神煞之說自漢代已盛行矣夫鬼神本乎二氣二氣化為五行以相生相尅為用得其相生之氣則其神吉得其相尅之氣則其神凶此亦自然之理至其神各命以名雖似乎無稽然物本無名凡名皆人之所加如周天列宿各有其名亦人所加非所本有則所謂某神某神不過假以記其方位别其性情而已不必以詞害意也厯代方技之家所𫝊不一輾轉附益其說愈繁要以不悖于隂陽五行之理者近是是書簡汰諸家删其鄙倍而括其綱要于以順天之道宜民之用大聖人之于百姓事事欲其趨利而逺害誠無微之不至矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
