body:
  text: 欽定四庫全書御定星厯考原卷四月事凶神月建天寶厯曰月建者陽建之神也所理之方戰鬭攻伐宜背之不可抵向所直之日宜封建視事不宜興造土功結親禮厯例曰正月建寅順行十二辰曹震圭曰月建所理之地戰鬬攻伐不宜向而宜背者蓋使我乘旺氣而攻彼休囚也所直之日宜封建視事者建者健也是月內羣神之長萬神無不咸服也不可興造土功者蓋彼當旺勢不可犯也其不可結親禮者是陽建獨旺隂建氣消之辰親禮之道宜隂陽相和若偏則不宜也月破月破者月建所衝之日也與歲破義同天罡河魁桑道茂曰天罡河魁者月內凶神也所直之日百事宜避厯例曰陽建之月前三辰為天罡後三辰為河魁隂建之月反是曹震圭曰魁罡者乃月建四殺之辰平收之日也洞源經云對七為衝隔三為破選擇家所謂辰破丑而丑衝未亥破寅而寅衝申午破卯而卯衝酉酉破子而子衝午申破已而已衝亥戌破未而未衝丑是也月殺廣聖厯曰月殺者月內之殺神也其日忌停賔客興穿掘營種植納羣畜厯例曰月殺者正月起丑逆行四季按月殺與歲殺同義見第二卷月刑廣聖厯曰月建所刑之辰其日忌出軍攻戰養育生財結婚姻營造屋舍厯例曰月刑者正月巳二月子三月辰四月申五月午六月丑七月寅八月酉九月未十月亥十一月卯十二月戌選擇家書曰寅刑己巳刑申申刑寅為無恩之刑未刑丑丑刑戌戌刑未為恃勢之刑子刑卯卯刑子為無禮之刑辰午酉亥為自刑曹震圭曰月刑者月建之三刑也是前後三辰相尅制也因名曰三刑假如無恩刑者謂已火也賴寅木而生反以長生之庚金制寅木也申金也賴已火而生反以長生之壬水制已火也寅木也賴申中長生之水土而生反以所生火尅申金也以子反害其母為無恩故曰刑也或曰寅以生火刑己中生金巳以寄土刑申中生水申以生水刑寅中生火也恃勢刑者丑以墓金尅未中墓木未以隂墓之水尅戌中墓火戌以墓火尅丑中墓金又云丑恃癸水刑戌之墓火戌恃辛金刑未之墓木未恃丁火刑丑之墓金也無禮刑者謂卯中之乙賴子為貴子中之癸賴卯為貴然卯以長生之巳土刑子中之癸水子以長生之辛金刑卯中之乙木傷其貴德失其尊卑故曰無禮也自刑者辰之墓土自制其墓水午中生乙自制其己土酉中生丁自制其辛金亥中生木自制其已土故曰自刑也按月刑與歲刑同而理解各異兩存其說以備互考又褚華谷曰子卯一刑也寅巳申二刑也丑戌未三刑也自卯順至子子逆至卯極十數而為無禮之刑寅逆至己己逆至申極十數而為無恩之刑丑順至戌戌順至未極十數而為恃勢之刑故皇數中天以十為殺數積數至十則悉空其數天道惡盈滿則覆也此三刑之法所由起也此亦可備一說月害神樞經曰月害者陽建所害之辰也所直之日忌攻城野戰牧養羣畜結㑹親姻請醫巫納奴婢厯例曰正月起已逆行十二辰曹震圭曰月害者月中六害也假令卯辰相害者卯以乙旺之木害辰墓之土辰以墓土却害卯中癸水也寅巳相害者謂寅以旺甲害己中戊土而已以生庚害寅中旺甲也丑午相害者丑以癸水害午中丁火午以己土害丑中癸水也子未相害者子以所生之辛金害未中墓木未以旺土害子中旺水也申亥相害者亥以生木害申中生土申以旺金害亥中生木又以生土害亥中旺水也酉戌相害者戌以墓火害酉之旺金酉以所生丁火害戌中辛金也按六害者不和也凡事莫不喜合而忌衝正月建寅與亥合而已衝之故寅與己害二月建卯與戌合而辰衝之故卯與辰害蓋月建者衆神之首衝其所合是以害也獨火按獨火與月害同亦名遊禍又名六害月虛樞要厯曰月虛者月內虛神也其日忌開倉庫出財物運動征行成親禮厯例曰月虛者正月起丑逆行四季曹震圭曰月虛者月建三合五行成形之位物初成形其體未實故名曰虛與月殺同位大耗樞要厯曰大耗者月中虛耗之神也其日忌營庫藏出財物逺經求取債負厯例曰大耗者正月起申順行十二辰曹震圭曰大耗者月建擊衝破散之辰也與月破同位並見第二卷小耗樞要厯曰亦月內之耗神也其日忌經營種蒔納財交易開市厯例曰小耗者常居月建前五辰曹震圭曰小耗者小損也乃月建氣絶之辰大耗之從神也並見第二卷大時神樞經曰大時者將軍之象也所直之日忌出軍攻戰築室㑹親李鼎祚曰大時者正月起卯逆行四仲淮南子曰大時者咸池也曹震圭曰大時者乃月建三合五行沐浴之辰也蓋五行至此則敗絶是最凶之辰也故曰大凶之時小時神樞經曰小時者郎將之象也其日忌結親姻開倉庫淮南子曰小時者月建也曹震圭曰小時者是當時之旺辰也忌結親姻者因陽氣獨持旺氣也忌開倉庫者是旺氣發而不收也四廢廣聖厯曰四廢者四時衰謝之辰也其日忌出軍征伐造舍迎親封建拜官納財開市厯例曰春庚申辛酉夏壬子癸亥秋甲寅乙卯冬丙午丁巳蓬瀛經曰四廢者是五行無氣福德不臨之辰百事忌用通書云春以庚辛為廢夏以壬癸為廢秋以甲乙為廢冬以丙丁為廢春庚辛者而申酉亦屬金夏壬癸者而子亥亦屬水秋甲乙者而寅卯亦屬木冬丙丁者而己午亦屬火謂之支干連見曹震圭曰四廢者干支俱絶也假令庚申辛酉絶於春寅卯辰也他倣此四窮總要厯曰四窮者謂亥為隂絶之辰以四時旺干臨之故曰四窮所直之日不可逺行征伐出納財物厯例曰春乙亥夏丁亥秋辛亥冬癸亥曹震圭曰亥者地支末辰極隂之位以四時隂干配之故曰四窮四耗總聖厯曰四耗者謂四時休干臨分至之辰也其日忌㑹親姻出師開倉庫施債負厯例曰春壬子夏乙卯秋戊午冬辛酉曹震圭曰物之將分者必散也至者盡也是隂陽數盡而將分也又得休干臨之故曰耗按四耗日固是休干亦休支也春壬子幹枝皆水夏乙卯幹枝皆木冬辛酉幹枝皆金秋戊午幹土而枝火洞源經云火不尅金何旺土生金火亦生金也蓋春木旺則水耗夏火旺則木耗秋金旺則火土耗冬水旺則金耗故曰四耗四擊四擊者春戌夏丑秋辰冬未按四擊者四時所衝之墓辰也如正二三月建寅卯辰辰與戌衝故戌為四擊也餘倣此五虛樞要厯曰五虛者四時絶辰也其日忌開倉庫營種蒔出財寶放債負厯例曰五虛者春己酉丑夏申子辰秋亥卯未冬寅午戌也曹震圭曰五虛者四時逢絶之辰也物絶則損朽其中虛而無實也故曰虛如春木旺已酉丑金絶也夏火旺申子辰水絶也秋金旺亥卯未木絶也冬水旺寅午戌火絶也按五虛者三合五行絶胎養之位與歲神三殺起例同五墓廣聖厯曰五墓者四旺之墓辰也其日忌營造起土嫁娶出軍厯例曰五墓者正二月乙未四五月丙戌七八月辛丑十月十一月壬辰四季月戊辰也曹震圭曰五墓者五行旺干自臨墓辰也十干者身之象若營造起土似臨於無氣之位也又以干為夫之象若嫁娶則夫自臨死氣之位也又以干為我若出軍征伐是自臨死墓之地也故忌之假如正二月木旺木墓於未加以乙未是自臨墓辰也餘倣此九坎廣聖厯曰九坎者月中殺神也其日忌乘船渡水修隄防築垣牆苫蓋屋舍厯例曰九坎者正月在辰逆行四季五月在卯逆行四仲九月在寅逆行四孟曹震圭曰坎者陷也險也不平也其忌如此義與次節九焦同九焦廣聖厯曰九焦者月中殺神也其日忌爐冶鑄造種植修築園圃厯例曰正月在辰逆行四季五月在卯逆行四仲九月在寅逆行四孟曹震圭曰九坎九焦者是月中之殺神逆天地之道者也假令正二三四為歲首東方之位當用孟辰以生萬物今則以季辰收殺萬物是其逆也五六七八為歲中今雖用仲辰成熟萬物然歲首不與其生焉有成熟哉九十十一十二月為歲之終萬物收藏之時今方欲以孟辰生育萬物豈能有生育哉是逆天地之道萬物無能成就也九空廣聖厯曰九空者月內殺神也其日忌修造倉庫出入貨財厯例曰九空者正月在辰逆行四季曹震圭曰九空者墓庫破散之神也庫破則空衝則散假令寅午戌月火庫在戌辰能衝散也亥卯未月木墓在未丑能衝散也申子辰月水墓在辰戌能衝散也己酉丑月金墓在丑未能衝散也今厯家所𫝊與九坎九焦同行者非蓋所傳有誤紀歲厯亦止是逆行四季大殺神樞經曰大殺者月中廉察也所直之日忌出軍征討嫁娶納財豎柱上梁移徙置室李鼎祚曰大殺者正月在戌二月在巳三月在午四月在未五月在寅六月在卯七月在辰八月在亥九月在子十月在丑十一月在申十二月在酉曹震圭曰東方之位生育萬物南方之地成熟萬物西方之位殺伐萬物北方之位收藏萬物大殺者月中廉察也子丑寅月厯西方申酉戌者蓋謂陽氣將出萬物將生故巡察西方無以妄殺也卯辰巳月厯南方巳午未者謂萬物生長之時故巡察南方使有成熟也午未申月厯東方寅卯辰者謂萬物成熟宜在養育也酉戌亥月厯北方亥子丑者謂萬物收成使有斂藏也劫殺神樞經曰劫殺者劫害之辰也其日忌臨官視事納禮成親戰伐行軍出入興販李鼎祚曰正月起亥逆行四孟曹震圭曰劫殺者三合五行之絶神也按劫殺起於絶並見第二卷死氣神樞經曰死氣者無氣之辰也其日忌戰鬭征伐療病求醫安置産室經營栽植李鼎祚曰死氣者常居月建前四辰曹震圭曰死氣者以月建為臨官前臨死位也假令二月建卯為臨官帝旺在辰衰在巳病在午死在未也或云生氣之衝辰也謂此愛其生彼愛其死我旺而彼死也故常與生氣對衝死神神樞經曰死神者月中凶神也其日忌請醫服藥出師征討種植樹木進人納畜李鼎祚曰常居月建前三辰曹震圭曰死神者以月建為旺辰前逢死位也大抵死氣之前必有死神其義同前遊禍神樞經曰遊禍者月中惡神也其日忌服藥請醫祀神致祭李鼎祚曰遊禍者正月起已逆行四孟曹震圭曰遊禍者三合五行臨官之神是對衝劫殺之位也按遊禍者以其流行於四隅故曰遊以其過旺故曰禍天獄神樞經曰天獄者月中禁神也其日忌獻封章興詞訟赴任征討李鼎祚曰天獄者正月在子順行四仲曹震圭曰天獄者是三合五行胎位之辰也當正月起子逆行非順行也恐𫝊之者有誤天火玉帳經曰天火者月中凶神也其日忌苫蓋築壘垣牆振旅興師㑹親娶婦厯例曰天火者正月在子順行四仲曹震圭曰天火非天之火是五行旺辰中藏陽火也假令寅午戌月在子蓋子中藏陽氣之火其勢最弱待寅午戌月火勢興旺以顯其光故子中有霹靂火也是水中之火見之於天也亥卯未月在卯蓋卯中有伏焰之火也火氣既生於寅至卯而木旺反蔽其焰而成炭又待亥卯未月木再生之故卯內有爐中火也申子辰月在午蓋午中有正旺之火其勢最大物莫敢侵其光反暗待申子辰月水勢將興反制其光上下俱明故午中有天上火也己酉丑月在酉謂酉中有長生丁火如硫黃煤炭之類故待己酉丑月金石之氣而再發旺也故酉中有山下之火也且子中之陽火卯中之木火午中之旺火酉中長生丁火莫非天道自然故以名之地火神樞經曰地火者月中凶神也其日忌修築園圃栽植種蒔厯例曰地火者正月起戌逆行十二辰曹震圭曰地火者隂奪陽也是隂建之權勢也天文志曰隂行陽之政物傷而必尅終以自害也竝見月厭節天狗樞要厯曰天狗者月中凶神也其日忌禱祀鬼神祈求福願厯例曰天狗者常居月建前二辰曹震圭曰天狗者月中禦衛之犬也去除私邪之神無使敢侵故居建前二辰是禦於門首也自子建之月起於寅寅者艮之陽辰也易曰艮為犬是也祈福願祠鬼神皆為正道故竝忌之土符土府地囊總要厯曰土符土府地囊皆土神也其日忌破土穿井開渠築牆厯例曰土符者正月丑二月己三月酉四月寅五月午六月戌七月卯八月未九月亥十月辰十一月申十二月子土府者與月建同行地囊者正月庚子庚午二月癸未癸丑三月甲子甲寅四月己卯己丑五月戊辰戊午六月癸未癸巳七月丙寅丙申八月丁卯丁巳九月戊辰戊子十月庚戌庚子十一月辛未辛酉十二月乙未乙酉曹震圭曰土符者乃土地握符信之神使掌五土也假令春木旺土受其尅故托子金以制之是春三月厯己酉丑也夏火旺土休賴火為母以養之故夏三月厯寅午戌也秋金旺土相不畏木制故秋三月厯亥卯未也冬水旺土亦剛堅賴水以柔和之故冬三月歷申子辰也土府者是土地之府庭也土為萬物之主月建為月內萬神之主各隨四時而運蓋月建之體本土也以其居故曰府地囊者乃土地之庫藏也其義未詳兵禁總要厯曰兵禁者用兵凶辰也其日忌出師振旅閲武教戰厯例曰兵禁者正月起寅逆行六陽辰曹震圭曰兵家所利者隂道也所忌者陽道也故兵禁正月起寅逆行六陽辰也又月令曰孟春之月不可稱兵稱兵必天殃兵戎不起不可從我始故正月以寅為禁辰也二月子相行四殺也三月戌耗破之辰也四月申四殺三刑也五月午自刑也六月辰天罡四殺也七月寅破耗三刑也八月子四殺死神也九月戌河魁也十月申六害也十一月午破耗也十二月辰四殺天罡也其忌可知大敗總要厯曰大敗者兵敗忌辰也其日忌臨陳侵敵攻城野戰厯例曰正月起卯逆行四仲曹震圭曰大敗者三合五行沐浴休敗之辰也其氣敗絶無以勝彼其忌可知伐日遁甲經曰伐日者支尅干辰也其日忌攻討征伐出軍掠地王璋曰伐日者庚午辛巳丙子戊寅己卯癸未癸丑甲申乙酉丁亥壬辰壬戌也曹震圭曰伐者彼伐於我也六壬經云干為尊為我支為卑為彼是卑伐於尊彼尅於我其義逆也故忌之專日經曰專日者謂支干五行相同也其日忌出軍厯例曰專日者甲寅乙卯丁巳丙午庚申辛酉癸亥壬子戊辰戊戌己丑己未共十二日也曹震圭曰六壬經云幹為我枝為彼今幹枝同類是彼我同德兩勢相敵不分勝負故忌出軍按專日亦名和日月厭天寶厯曰月厭者隂建之辰也所理之方可以禳災祈福避病所直之日忌逺行歸家移徙婚嫁厯例曰月厭者正月在戌逆行十二辰曹震圭曰月厭者厭魅之神也其性暗昧私邪不正故各忌之蓋十一月建子隂陽氣爭冬至前隂氣極冬至後陽氣生故自建子之月陽建順厯丑寅卯一十二辰隂建逆厯亥戌酉一十二辰至五月夏至二氣又同建而相爭也亦名曰隂建按淮南子曰北斗之神有雌雄十一月起運於子月徙一辰雄左行雌右行五月合於午謀刑十一月合於子謀德太隂所居辰為厭日厭日不可以舉百事厭對天寶厯曰厭對者月厭所衝之辰也其日忌嫁娶厯例曰厭對者正月起辰逆行十二辰往亡氣往亡堪輿經曰往者去也亡者無也其日忌拜官上任逺行歸家出軍征討嫁娶尋醫厯例曰往亡者正月在寅二月在巳三月在申四月在亥五月在卯六月在午七月在酉八月在子九月在辰十月在未十一月在戌十二月在丑又氣往亡者立春後七日驚蟄後十四日清明後二十一日立夏後八日芒種後十六日小暑後二十四日立秋後九日白露後十八日寒露後二十七日立冬後十日大雪後二十日小雪後三十日皆自交節日數之曹震圭曰往亡者往而不反之意也孟者初也仲者中也季者末也蓋歲之始中終之義也正二三四月乃歲之初皆以四孟辰為之乃五行初生之地是生氣之道往而亡也五六七八月乃歲之中皆以四仲辰為之蓋四仲者五行當旺之辰是旺氣之道往而亡也九十十一十二月乃歲之終皆以四季辰為之謂四季者乃五行終墓之地是萬物皆歸往而亡也又氣往亡者以四立月往亡之辰三合化象之成數言之也假令正月立春寅為往亡寅午戌合火局火之成數七也四月立夏卯為往亡亥卯未合木局木之成數八也七月立秋酉為往亡己酉丑合金局金之成數九也十月立冬未為往亡土無化象便以本行土為之其成數十也各倍之為次月往亡日三之為下月往亡日也獨水數不用者蓋四立之月往亡無申子辰日也然一歲之內四季之月以辰為首辰月以申為往亡申合水局水之成數六也故三月中氣後六日九月中氣後十二日各得往亡六月則土旺後二六一十二日十二月土旺後三六一十八日亦得往亡或節氣加時早晚間有差一日者然其理大槩如此通書云唐太宗曰宋武帝以往亡起兵軍吏以為不可帝曰我往彼亡果克之由此言之可廢明矣歸忌廣聖厯曰歸忌者月內凶神也其日忌逺行歸家移徙娶婦厯例曰孟月丑仲月寅季月子曹震圭曰子者一陽丑乃二陽寅乃三陽蓋此三辰陽氣始盛主動於外不可反歸於內也按孟月忌丑仲月忌寅季月忌子者皆忌退後一辰所謂歸忌也如子為仲丑為季寅為孟故孟月忌退歸於季仲月忌退歸於孟季月忌退歸於仲也章光堪輿經曰章光者隂建前辰也其日忌嫁娶厯例曰常居隂建前一辰也曹震圭曰章光者能為月厭彰顯其道故曰章光無翹天寶厯曰無翹者翹猶尾也陽烏所主隂則無之常居厭後故曰無翹其日忌嫁娶曹震圭曰翹猶首翹婦人之飾也無翹者是無其飾也故忌嫁娶咸池招搖八風觸水龍樞要厯曰咸池招搖八風觸水龍所直之日忌乘船渡水涉江河厯例曰咸池者正月起卯逆行四仲招搖者正月起辰逆行十二辰八風者春丁丑己酉夏甲申甲辰秋辛未丁未冬甲戌甲寅觸水龍者丙子癸丑癸未也曹震圭曰咸池者三合五行沐浴之辰是陽建之浴地也五行至此皆值沒溺其忌可知招搖者動而不安隂建之衝也故與六儀同行又天文志有招搖之星在梗河亢池之左角亢之次辰宫也故正月起辰八風者是八節八卦之風也各以四立之建後一辰為四立之風以其三合前辰為次節風如立夏建巳以辰為立夏風也申為三合前辰為夏至風是也假令立春建寅以建前丑為正風以丁配之取溫和之意也以酉為傍風配之以已取巳土長生之地也立夏建巳以辰為正風申為傍風皆以甲配之者立夏之後風勢極微故配甲以生之也立秋建申以未為正風而不取傍風者謂秋氣好殺而無養育之性以辛配之取金風之象又以丁配之存其溫和之氣也立冬建亥以戌為正風寅為傍風皆以甲配之者以風鳴冬其勢極大配之以甲木以生風也共為八節故曰八風觸水龍者觸犯也龍水物也壬癸亥子水也能與水相勝者火土也火在上為丙土居下為四季辰乃龍之正位壬水所居戌亥為乾天之位有龍象焉故惟餘丙子癸未癸丑為觸水龍日也血忌血支樞要經曰血忌血支其日忌針刺出血厯例曰血忌者正月丑二月未三月寅四月申五月卯六月酉七月辰八月戌九月巳十月亥十一月午十二月子血支者正月在丑順行十二辰曹震圭曰血支者氣血之支流也故起於旺建之後生氣之前如人生之後自有血脈暢於四肢若其日針刺者是去其血也故忌之血忌者以人之血脈出入往來一噓一吸運動不息故一厯本位一居其衝亦隂陽各相配之義也故建陽之月則厯於丑寅卯辰巳午陽氣之位建隂之月則厯於未申酉戌亥子隂氣之位與續世義同正月與血支同起於丑者正月隂陽交泰血氣通和然後流布於四肢也官符總要厯曰官符者其日忌拜官視事上表章陳詞訟厯例曰官符者正月起午順行十二辰曹震圭曰官符者是歲月中掌符信之官文權之職也常居三合前辰大抵歲辰月建以其三合前辰為文官後辰為武職是左文右武之義假令正月建寅則午上有官符文權也戌上有白虎武職也併見第二卷天吏樞要厯曰天吏者月中凶神也其日忌臨官赴任逺行詞訟厯例曰天吏者正月起酉逆行四仲曹震圭曰天吏者三合五行死氣之位五行至此死而無氣乃天之凶吏全無生意也其忌可知臨日樞要厯曰臨日者上臨下之義也其日忌臨民訴訟厯例曰臨日者正月午二月亥三月申四月丑五月戌六月卯七月子八月巳九月寅十月未十一月辰十二月酉曹震圭曰臨者上臨於下也是陽建之使臣奉上命以授百官者也建陽之月在三合前辰是臨於文官官符也建隂之月在三合後辰是臨於武職白虎也天賊神樞經曰天賊者月中盜神也其日忌逺行李鼎祚曰天賊者正月在丑逆行十二辰曹震圭曰天賊者盜神也常居天倉後辰蓋倉庫之後必有盜也致死樞要厯曰致死者月中凶神也其日忌求醫藥厯例曰致死者正月起酉逆行四仲曹震圭曰致死者月建三合五行死敗之辰也與天吏同牢日獄日徒隸死别伏罪不舉罪刑壇經曰牢日獄日徒隸死别伏罪不舉罪刑其日皆不宜臨官視事登壇受職厯例曰牢日者春辰夏未秋戌冬丑也獄日者春未夏戌秋丑冬辰也徒隸者春申夏亥秋寅冬巳也死别者春戌夏丑秋辰冬未也伏罪者春亥夏寅秋巳冬申也不舉者春子夏卯秋午冬酉也罪刑者春丑夏辰秋未冬戌也曹震圭曰牢日者四時衰謝之辰也衰在墓地故曰牢獄日者四時墓辰也入於墓故曰獄徒隸者是四時五行絶辰也置之於卑賤也死别者以其將死而又歸於墓是四時五行死辰之墓也如春屬木死於午午為火戌為火墓是也伏罪者是子見其母也蓋為子有罪父母責之故云伏罪也不舉者是四時五行沐浴之辰似初沐浴而未冠帶之象不可舉薦於上人也罪刑者四時五行相刑之墓辰也如春金尅木金墓在丑也餘倣此蚩尤飛流天棒隂私土勃雷公樞要經曰蚩尤飛流天棒隂私土勃雷公月內黑道也其日忌開掘取土立柱上梁嫁娶出行臨官視事厯例曰蚩尤者正月起寅天棒者正月起午雷公者正月起子皆順行六陽辰飛流者正月起卯隂私者正月起酉土勃者正月起亥皆順行六隂辰並解見月事吉神篇天刑朱雀白虎天牢元武勾陳神樞經曰天刑朱雀白虎天牢元武勾陳者月中黑道也所理之方所直之日皆不可興土功營屋舍移徙逺行嫁娶出軍李鼎祚曰天刑者正月起寅白虎者正月起午天牢者正月起申皆順行六陽辰朱雀者正月起卯元武者正月起酉勾陳者正月起亥皆順行六隂辰並解見月事吉神篇八龍七鳥九虎六蛇總要厯曰八龍七鳥九虎六蛇其日皆不可迎婚嫁娶厯例曰春甲子乙亥為八龍夏丙子丁亥為七鳥秋庚子辛亥為九虎冬壬子癸亥為六蛇曹震圭曰亥者隂氣之極子者陽氣初生是隂陽氣絶脫謝之辰也十干象夫十二支象婦今以四時旺干而配亥子是夫旺而婦絶且我臨於絶地也故忌用之按甲乙者東方木也為青龍其成數八丙丁者南方火也為朱雀其成數七庚辛者西方金也為白虎其成數九壬癸者北方水也為龜蛇其成數六故各因以為名也九醜金匱經曰乙者雷電始發之日戊巳者北辰位下之日辛者萬物決斷之日壬者三光不照之日子午卯酉四仲之辰日月之門隂陽之界五干臨此四辰其日不可出軍嫁娶移徙築室曹植曰九醜者乙卯己卯辛卯乙酉己酉辛酉戊午戊子壬午壬子曹震圭曰卯酉為日月出入之門子午為隂陽交爭之界乙為六合辛為太陽壬為元武已為六賊戊為勾陳故此五干加此四辰名曰醜又以五干四辰其共數九故以名之八專曾門經曰八專日忌出軍嫁娶曹植曰八專者丁未己未庚申甲寅癸丑也按六壬日辰課體訣曰甲寄居寅乙寄辰還將丙戊己宫尋未支丁巳藏功用申地庚金作主盟辛在戌宫癸寄丑壬干原寄在登明二盤四正無差錯運式通靈動鬼神蓋即十干祿辰除子午卯酉四正不用故移於辰戌丑未而各取其干支所配之日是為八專今六壬三傳起例用之如甲祿在寅卯不用故乙在辰辰中亦有乙木也丙戊祿在己午不用故丁巳在未也庚祿在申酉不用故辛在戌壬祿在亥子不用故癸在丑相配止有五日以其干支比和故為専同専日取義以十二支除四正不用餘八故為八専也五離樞要厯曰五離者月中離神也其日忌結婚姻㑹親友作交關立契券厯例曰五離者申酉日是也曹震圭曰五離者是隂陽重㑹之辰也再合則離義見月吉神五合節重日天寶厯曰重日者以隂陽混合於亥陽起於甲子而順隂起於甲戌而逆至己亥而同故曰重日其日忌為凶事利為吉事厯例曰重日者己亥二日也曹震圭曰亥為隂極之位坤辟在焉己為陽極之位乾辟在焉是陽中陽而隂中隂也故曰重其日忌為凶事者恐重犯也利為吉事者宜再見也復日天寶厯曰復日者為魁罡所繫之辰也其日忌為凶事利為吉事厯例曰復日者正七月甲庚二八月乙辛四十月丙壬五十一月丁癸三九六十二月戊巳日也曹震圭曰復者重見也為本建之辰與所遇之干同也假令正月寅即甲也而又見甲是復也又如辰戌即戊也丑未即巳也而又見戊巳是復也餘倣此又地理新書云正月甲七月庚二月乙八月辛四月丙十月壬五月丁十一月癸三月九月戊六月十二月巳四離玉門經曰離者隂陽分至前一辰也謂建卯之月陽氣出隂氣入建子之月隂氣降陽氣升建酉之月隂氣出陽氣入建午之月陽氣降隂氣升故先一日為四離辰也李鼎祚曰此日忌出行征伐曹震圭曰四離者冬至前一日水離夏至前一日火離春分前一日陽體分而木亦離也秋分前一日隂體分而金亦離也故名曰四離四絶玉門經曰四絶者四立前一辰也李鼎祚曰此日忌出軍逺行曹震圭曰立春木旺水絶立夏火旺木絶立秋金旺土絶立冬水旺金絶故先一日為絶也長短星厯例曰長星者正月初七二月初四三月初一四月初九五月十五六月初十七月初八八月初二初五九月初三初四十月初一十一月十二十二月初九是也短星者正月二十一二月十九三月十六四月二十五五月二十五六月二十七月二十二八月十八十九九月十六十七十月十四十一月二十二十二月二十五日是也其日忌開市納財立券交易裁衣曹震圭曰長者過也短者不及也凡開市納財立券交易裁衣皆貴乎中平適宜若或過或不及其忌可知蓋長短星者金火也謂金火之氣能毁傷萬物也按長星者庚辛也春夏用庚秋冬用辛陽取陽隂取隂也以月建內所寄之干四季則用四時隂干依五虎元遁得庚辛者自建辰向前數之春夏至庚則止秋冬至辛則止其本節所當之卦則取其宫數如春月則以卯為震三四月則以巳為巽四其餘辰則一辰當一得數是也假如正月建寅寅中有甲以甲遁得庚午自寅一震三辰一巳一午一共得七數故七日為長星也二月建卯卯中有乙以乙遁得庚辰自卯之震三並辰一共四數故四日為長星也三月建辰辰中無所寄就乙仍遁得庚辰止得一數故一日為長星也四月建己巳中有丁以丁遁得庚戌自已之巽四厯午未申酉戌共九數也午不用離九者以己用巽四故也五月建午午中有丙以丙遁得庚寅為丙火長生之位故向前得庚子自離九厯未申酉戌亥子得一十五也六月建未就丁遁得庚戌自未申厯酉之兌七至戌共得一十也用兌七者以六月為金氣伏藏之時故用西方之卦也七月建申申中有庚為同體又以秋冬用辛故不用遁辰而用旺辰之酉自申至酉之兌七共得八數也八月建酉酉中有辛故即得兌七也今為二日五日合之亦得七九月建戌就辛遁得庚子辛丑自戌至子得三自戌至丑得四也不用宫數者以戌尚西方之令未至於乾也十月建亥亥中有癸遁得辛酉謂干支同體故用壬遁得辛亥故止得一也十一月建子子中有壬遁得辛亥故自子之坎一至亥得十二也十二月建丑就癸遁得辛酉自丑至酉得九也不用宫數與九月同短星者丙丁也春夏用丙秋冬用丁陽取陽隂取隂也各以月建內所寄之干四季則用四時隂干依五子遁得丙丁者自建辰向前數之春夏至丙則止秋冬至丁則止其本節所當之卦則取其宫數其餘辰則一辰當一得數于朔實二十九日內減之餘數是也假如正月甲遁得丙寅寅為艮八以減二十九餘二十一故二十一日為短星也二月乙遁得丙戌自卯之震三至戌得一十以減二十九餘一十九也三月就乙遁得丙子自辰一厯巽四至子得一十三以減二十九餘一十六也四月丁遁得丙午為干支同體故即用旺辰之巽四以減二十九餘二十五也五月丙遁得丙申自午至申之坤二共四以減二十九餘二十五也六月就丁遁得丙午為干支同體故即用旺辰得午之離九以減二十九餘二十也七月庚遁得丁丑自申之坤二厯酉戌亥子丑得七以減二十九餘二十二也八月辛遁得丙申丁酉自兑七至申得一十八至酉得一十九也不以減二十九者以其在一十六以上也九月就辛遁得丙申丁酉故自戌至申得一十一至酉得一十二不用宫數與長星同以減二十九餘十八十七也今為十六日十七日者未知孰是十月建亥用癸遁得丁巳自亥之乾六至巳得十二以減二十九餘一十七也今為十四日者未知孰是大抵長星應在十五以前短星應在十六以後恐𫝊者誤也十一月壬遁得丙午以子丑之月水旺火寒又為丙胎養之位故復用也自子之坎一至午得七以減二十九餘二十二也十二月就癸遁得丙辰自丑至辰得四以減二十九餘二十五也不用宫數與長星同又按長星用五虎遁短星用五子遁者長星金也隂也短星火也陽也隂金胎於寅陽火胎於子也酉月金旺戌月火墓又為西方之位既取能傷萬物之義則其各二日也宜矣反支厯例曰反支以月朔得戌亥日者初一日得申酉日者初二日得午未日者初三日得辰巳日者初四日得寅卯日者初五日得子丑日者初六日為反支也其日忌上表章按十二支皆以順布今自戌亥而逆之是反支也其忌可知上朔堪輿經曰上朔日忌宴㑹嫁娶逺行上官厯例曰陽年以年干加寅順數至亥隂年以年干加丑順數至巳也曹震圭曰丑寅者艮卦之方也萬物始終之所也巳者陽極之辰亥者隂極之辰故陽有生發萬物之功者寅也隂有成終萬物之道者丑也以陽而來㑹於極隂以隂而往㑹於極陽則非其相㑹之道也其忌可知御定星厯考原卷四
