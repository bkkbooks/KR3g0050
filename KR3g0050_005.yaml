body:
  text: 欽定四庫全書御定星厯考原卷五日時總類月建十二神厯書曰厯家以建除滿平定執破危成收開閉凡十二日周而復始觀所值以定吉凶每月交節則疊兩值日其法從月建上起建與斗杓所指相應如正月建寅則寅日起建順行十二辰是也淮南子曰正月建寅則寅為建卯為除辰為滿巳為平主生午為定未為執主陷申為破主衡酉為危主杓戌為成主小德亥為收主大德子為開主太陽丑為閉主太隂選擇宗鏡曰建為歲君為元神為吉凶衆神之主帥可坐不可向其在山在方疊吉星則大吉疊凶星則凶除為四利太陽小吉滿為土瘟為四利喪門又為天富小吉平為三台又為土曲大吉定為歲三合為顯星吉又為地官符畜官次凶執為四利之死符又為小耗凶破為歲破為大耗大凶危為極富星為谷將星為四利龍德吉成為三合吉又為飛廉又為四利白虎小凶收為四利福德小吉又為八座小凶開為青龍太隂為生氣華蓋上吉又為四利弔客小凶閉為病符凶平成開危最吉定除次吉破大凶按月建十二神除危定執成開為吉建破平收滿閉為凶厯書所謂建滿平收黑除危定執黃成開皆可用閉破不相當者也選擇宗鏡以四利三元諸神相配吉凶亦未盡合如以建為太歲除為太陽滿為喪門破為歲破危為龍德此相合者也至以平為太隂定為官符執為死符成為白虎收為福德開為弔客此不相合者也大抵凡日吉神多則吉凶神多則凶又各視其神之宜忌以為趨避亦未可以執一而論也四利三元李淳風四利三元一太歲二太陽三喪門四太隂五官符六死符七歲破八龍德九白虎十福德十一弔客十二病符如甲子年則以太歲加子丑為太陽寅為喪門餘倣此黃黑二道按黃黑二道者黃道六黑道六共十有二以配十有二辰一青龍二明堂三天刑四朱雀五金匱六天德七白虎八玉堂九天牢十元武十一司命十二勾陳其法則寅申青龍起子卯酉起寅辰戌起辰巳亥起午子午起申丑未起戌順行十二辰月起日則建寅之月子日為青龍丑日為明堂日起時則子日申時起青龍酉時為明堂依次順數其義見月事凶神篇天乙貴人歌曰甲戊庚牛羊乙巳鼠猴鄉丙丁豬雞位壬癸蛇藏六辛逢馬虎此是貴人方曹震圭曰天乙者乃紫微垣左樞傍之一星萬神之主掌也一日二者隂陽分治內外之義也辰戌為魁罡之位故貴人不臨戊以配中央之位乃勾陳后宫之象故與甲同其起例以丑乃紫微後門之左陽界之辰也未乃紫微南門之右隂界之辰也甲者十干之首故陽貴以甲加丑逆行甲得丑乙得子丙得亥丁得酉巳得申庚得未辛得午壬得己癸得卯此晝日之貴也隂貴以甲加未順行甲得未乙得申丙得酉丁得亥巳得子庚得丑辛得寅壬得卯癸得已此暮夜之貴也戊以助甲成功故亦得丑未若六辛之獨得寅午則自然所致更無疑矣又通書云郭景純以十干貴人為吉神之首至靜而能制羣動至尊而能鎮飛浮以其為坤黃中通理乃貴人之德是以陽貴人出於先天之坤而順隂貴人出於後天之坤而逆天干之德未足為貴而干德之合氣乃為貴也先天坤卦在正北陽貴起於先天之坤故從子起甲甲德在子氣合於己故巳以子為陽貴以次順行乙德在丑氣合於庚丙德在寅氣合於辛丁德在卯氣合於壬辰為天羅貴人不居故戊跨在巳氣合於癸午與先天坤位相對名曰天空貴人有獨無對故陽貴人不入於午巳德在未氣合於甲庚德在申氣合於乙辛德在酉氣合於丙戌為地網貴人不居故壬跨在亥氣合於丁子坤位貴人不再居故癸在丑氣合於戊是為陽貴起例申庚合乙酉辛合丙戌地網亥壬合丁未巳合甲子甲合己午天空丑乙合庚癸合戊巳戊合癸辰天羅卯丁合壬寅丙合辛歌曰庚戊見牛甲在羊乙猴巳鼠丙雞方丁豬癸蛇壬是六辛逢虎貴為陽此十干先天相合之氣屬陽故從子位順行分居地盤九支謂之陽貴人旦晝於冬至後用之後天坤卦在西南隂貴起於後天之坤故從申起甲甲德在申氣合於巳故巳以申為隂貴以次逆行乙德在未氣合於庚丙德在午氣合於辛丁德在己氣合於壬辰為天羅貴人不居故戊跨在卯氣合於癸寅與後天坤位相對名曰天空貴人有獨無對故隂貴人不入於申巳德在丑氣合於甲庚德在子氣合於乙辛德在亥氣合於丙戌為地網貴人不居故壬跨在酉氣合於丁申坤位貴人不再居故癸跨在未氣合於戊是為隂貴起例申甲合巳酉壬合丁戌地網亥辛合丙未乙合庚癸合戊子庚合乙午丙合辛丑巳合甲巳丁合壬辰天羅卯戊合癸寅天空歌曰甲貴隂牛庚戊羊乙貴在鼠巳猴鄉丙豬丁雞辛遇馬壬蛇癸屬隂方此十干後天相合之氣屬隂故從申位逆行分居地盤九支謂之隂貴人暮夜於夏至後用之按曹氏與通書二説各有意義但曹氏則以陽為隂以隂為陽夫陽順隂逆陽前隂後自然之理也當以起未而順者為陽起丑而逆者為隂方是喜神歌曰甲巳在艮乙庚乾丙辛坤位喜神安丁壬寄向離宫坐戊癸還依巽上看曹震圭曰大抵物之所喜者母見子也假令甲巳化土生金為子金之所居者丑也丑近於艮丙辛化水生木為子木之所居者未也未近於坤戊癸化火生土為子土居於辰近於巽也乙庚化金生水為子水居於辰辰既有土故居於乾乾為亥子也丁壬化木生火為子火旺於午離也按物以相見為喜易傳曰相見乎離離者南方之卦也於五行為火於十干為丙喜神者見丙也假令甲巳之干用五虎元起丙寅寅為艮故在艮也乙庚之干得丙戌戌為乾故在乾也丙辛之干得丙申申為坤故在坤也丁壬之干得丙午午為離故在離也戊癸之干得丙辰辰為巽故在巽也二十八宿配日按日有六十宿有二十八四百二十日而一周四百二十者以六十與二十八俱可以度盡也故有七元之説一元甲子日起虛以子象鼠而虛為日鼠也二元甲子起奎三元甲子起畢四元甲子起鬼五元甲子起翼六元甲子起氐七元甲子起箕至七元盡而甲子又起虛周而復始但一元起於何年月日則不可得而考矣二十八宿直日所屬七曜及異名虛昴星房為太陽蚤日危畢張心為太隂莫日室觜翼尾屬火壁參軫箕屬水奎井角斗屬木婁鬼亢牛屬金胃柳氐女屬土十二辰禽象分隂陽十二辰禽象以二十八宿之列於十二宫者配之既見首卷又有以十二象分隂陽者子前四刻為昨夜之隂後四刻為今日之陽猶冬至前為隂冬至後為陽也故鼠前足四爪後足五爪丑屬隂故牛蹄分寅屬陽故虎五爪卯屬隂故缺唇且四爪辰屬陽故龍五爪巳屬隂故蛇舌分午屬陽故馬蹄圓未屬隂故羊蹄分申屬陽故猴五爪酉屬隂故雞四爪戌屬陽故狗五爪亥屬隂故豬蹄分旬中空亡旬中空亡者甲子旬中戌亥空甲戌旬中申酉空甲申旬中午未空甲午旬中辰巳空甲辰旬中寅卯空甲寅旬中子丑空按十日為旬以十干配十二支自甲至癸而止餘二辰天干不及故為空亡也如甲子起至癸酉止不及戌亥故甲子旬十日皆以戌亥為空餘倣此截路空亡截路空亡者甲巳日申酉時乙庚日午未時丙辛日辰巳時丁壬日寅卯時戊癸日子丑時按截路空亡遇壬癸也行路而遇水則不可行也如甲巳日以五鼠遁起甲子順厯之得壬申癸酉故甲巳日以申酉為截路空亡也餘倣此五等用卦厯例曰冬至公中孚始辟復侯屯內小寒侯屯外大夫謙卿睽大寒公升辟臨侯小過內立春侯小過外大夫蒙卿益雨水公漸辟泰侯需內驚蟄侯需外大夫隨卿晉春分公解辟大壯侯豫內清明侯豫外大夫訟卿蠱穀雨公革辟夬侯旅內立夏侯旅外大夫師卿此小滿公小畜辟乾侯大有內芒種侯大有外大夫家人卿井夏至公咸辟姤侯鼎內小暑侯鼎外大夫豐卿渙大暑公履辟遁侯恆內立秋侯恆外大夫節卿同人處暑公損辟否侯巽內白露侯巽外大夫萃卿大畜秋分公賁辟觀侯歸妹內寒露侯歸妹外大夫無妄卿明夷霜降公困辟剝侯艮內立冬侯艮外大夫既濟卿噬嗑小雪公大過辟坤侯未濟內大雪侯未濟外大夫蹇卿頤按五等用卦皆出於漢儒焦延夀京房之説所謂卦氣者也今厯無之姑存於此三伏厯例曰三伏者四時代謝皆以相生立春以木代水水生木也立夏以火代木木生火也立冬以水代金金生水也至於立秋以金代火金畏火尅故至庚日則必伏藏庚者金也金氣伏藏則火益熾三陽數也故夏至後第三庚為初伏第四庚為中伏立秋後初庚為末伏謂之三伏如夏至日得庚便為初庚立秋日得庚亦即為末伏也二社孝經緯曰社者土地之主也封土為社以報土功也厯例曰二分前後近戊為社曹震圭曰勾龍共工能平水土祀以為社后稷能殖百榖祀以為稷社為土神稷為穀神今以二分之氣祭者謂春分萬物發生百穀將種所以祈也秋分萬物成熟百穀將收所以報也得辛龍治水附自元旦日干順數至幾日逢辛日者即為得辛自元旦日支順數至幾日逢辰日者即為幾龍治水朔日按朔者日月交會之辰也月本無光借日光以為光逺則光顯近則光隱合朔日月同宫近度故不見月若復南北同度則日為月所蔽而日為之食矣故日食在朔上弦按上弦者周天四分之一也月猶銀丸受光含影自合朔後去日漸逺日照其西故自下視之如銀鉤然是三日而哉生明也至初八日間去日九十度日照其半西明而東暗如弓弦之平分也因自虧而向盈故曰上望日按望日者日月相望之辰也日月相衝日在地下月在天上相距六宫對照而光滿若南北同度則月值暗虛恰為地影所隔而月為之食矣故月食在望下弦按下弦者周天四分之三也自望而後去日漸近日照其東而西虧是望後哉生魄也至二十三日間西去日二百七十度東去日九十度日照其半東明而西暗亦猶上弦之平分皆所謂近一而逺三也因自盈而向虧故曰下晦日按晦日者月之盡也去日甚近將與日合其光晦隱而不見至朔則既合而光復生朔者蘇也月死於晦而復蘇於朔也故晦日百事不宜又厯例曰晦朔弦望之辰忌服藥療病曹震圭曰晦朔弦日者陰氣不足之辰也望日者隂奪陽也故其日忌服藥療病滅日沒日厯例曰滅沒日忌療病服藥曹震圭曰滅日者積朔虛分而為之沒日者積氣盈分而為之非天地之全氣也故其日忌療病服藥按滅日沒日見於漢書詳載於授時厯今厯無之月忌日通書云俗忌初五十四二十三年年月月在人間其法以五黃土值日相配廉貞火生起中宫之土也每月初一日起一白水入中宫與貪狼木相配水木相生也初二日二黑土與巨門土相配比和也初三日三碧木能制緑存土也初四日四緑木與文曲水相生也初五日五黃土配廉貞火火生土旺火晦土湮而己初十十九又數一白貪狼至十四二十三又值五黃廉貞此俗忌也按九宫之次自一白至九紫九星之次則一貪狼二巨門三祿存四文曲五廉貞六武曲七破軍八左輔九右弻故其相配如此又以其日為九五之數自初一至初五五數也自初五至十四自十四至二十三皆距九日世不敢用假言其忌故曰俗忌也人神天寶厯曰人神者人之神識也其逐日所在忌用針灸曹震圭曰人神者非人之神識也是六氣隂陽所在表裏也黃帝內經靈樞經甲乙經所載一日足大指厥隂分刺灸之發跗腫二日外踝少陽分刺灸之陽經筋緩三日在股少隂分刺灸之小腹痛四日腰太陽分刺灸之腰僂無力五日在口太隂分刺灸之舌強六日兩手陽明分刺灸之咽喉不利七日內踝少隂分刺灸之隂經筋急八日手腕太隂分刺灸之腕不收九日在尻厥隂分刺灸之主多病結十日腰背太陽分刺灸之腰背僂十一日鼻柱陽明分刺灸之齒面腫十二日髮際少陽分刺灸之令人耳重聽十三日牙齒少隂分刺灸之氣寒十四日胃腕陽明分刺灸之氣脹十五日遍身不補不瀉刺灸大禁十六日在胸太陽分刺灸之主逆息十七日氣衝陽明分刺灸之喘息十八日在股少隂分刺灸之隂氣痛十九日在陽明分刺灸之發腫二十日內踝少隂分刺灸之經筋癴二十一日手小指太陽分刺灸之手不仁二十二日足外踝少陽明分刺灸之經筋緩二十三日肝及足厥隂分刺灸之發轉筋二十四日手陽明分刺灸之咽中不利二十五日足陽明分刺灸之胃氣脹二十六日在胸太隂分刺灸之令人喘咳二十七日在膝陽明分刺灸之足脛厥逆二十八日在隂少隂分刺灸之小腹急痛二十九日膝脛厥隂分刺灸之筋痿少力三十日陽明分月空亡不瀉不治故以其所在謂之人神逐建人神建日在足除日在尻滿日在腹平日在背定日在心執日在手破日在口危日在鼻成日在肩收日在頭開日在耳閉日在目十二辰人神子日在目丑日在耳寅日在胸卯日在鼻辰日在腰巳日在手午日在心未日在足申日在肩酉日在頭戌日在頸亥日在項曹震圭曰以上人神所在之日並忌針灸日遊神經曰遊神所在不可安産室掃舍宇設牀帳厯例曰癸巳至丁酉日在北戊戌己亥日在中庚子辛丑壬寅日在南癸卯日在西甲辰日至丁未日在東戊申又在中己酉日出遊四十四日其義未明太白逐日遊方厯例曰一日十一日二十一日震方二日十二日二十二日巽方三日十三日二十三日離方四日十四日二十四日坤方五日十五日二十五日兌方六日十六日二十六日乾方七日十七日二十七日坎方八日十八日二十八日艮方九日十九日二十九日在天十日二十日三十日在地也曹震圭曰太白者金神之氣巡遊八方所在不可抵向按一日初起於震者所謂帝出乎震也終於艮者所謂成言乎艮也皆依後天八卦之序依次遞遷至八而八卦盡矣九為陽數故在天十為數終故在地今厯日所載則九日十九日二十九日中央十日二十日三十日在天未詳孰是無祿日通書云甲辰乙巳庚辰辛巳丙申戊戌丁亥己丑壬申癸亥此十日祿皆落空故云無祿如甲祿在寅乙祿在卯甲辰旬寅卯空故甲辰乙巳為無祿也庚祿在申辛祿在酉甲戌旬申酉空故庚辰辛巳為無祿也丙戊祿在巳甲午旬巳空故丙申戊戌為無祿也丁巳祿在午甲申旬午空故丁亥己丑為無祿也壬祿在亥甲子旬亥空故壬申為無祿也癸祿在子甲寅旬子空故癸亥為無祿也此十日名曰無祿日又曰十惡大敗日然惟隨各年及本命避之如庚戌年及庚戌生人忌用甲辰之類是也四煞沒時又曰四大吉時四煞者寅午戌火煞在丑亥卯未木煞在戌申子辰水煞在未巳酉丑金煞在辰凡取四煞沒時者以月將加時使四煞臨乾坤艮巽之位為四煞沒於四維正四七十四孟月用甲丙庚壬時二五八十一四仲月用艮巽坤乾時三六九十二四季月用癸乙丁辛時如正月月將在亥則以亥加甲或加丙或加庚或加壬依二十四方位順推之則辰戌丑未四煞皆臨四維卦位是為四煞沒時也以四煞既沒故又曰四大吉時隂陽大會堪輿經曰正月大會甲戌二月大會乙酉五月大會丙午六月大會丁巳七月大會庚辰八月大會辛卯十一月大會壬子十二月大會癸亥正月陽建在寅隂建在戌陽主干隂主支也陽建在寅近於甲陽甲隂戌支干相和會故甲戌為正月大會也二月陽建於卯隂建於酉卯近於乙陽乙隂酉故乙酉為二月大會也五月隂陽二建俱會於午午近於丙以丙配午故丙午為五月大會也六月陽建於未隂建於己未近於丁以丁配巳故丁巳為六月大會也七月陽建於申隂建於辰陽建近庚以庚配辰故庚辰為七月大會也八月陽建於酉隂建於卯酉近於辛以辛配卯故辛卯為八月大會也十一月隂陽二建俱會於子子近於壬以壬配子故壬子為十一月大會也十二月陽建於丑隂建於亥丑近於癸以癸配亥故癸亥為十二月大會也隂陽大會立成月會大會大會所領日春夏秋冬正月甲戌癸亥甲子乙丑丙寅丁卯戊辰己巳庚午辛未士申癸酉歲位歲後歲對歲前七月庚辰甲戌乙亥丙子丁丑戊寅己卯歲對歲前歲位歲後二月乙酉庚辰辛巳壬午癸未甲申歲位歲後歲對歲前八月辛卯乙酉丙戌丁亥戊子己丑庚寅歲對歲前歲位歲後五月丙午辛卯壬辰癸巳甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳歲前歲位歲後歲對十一月壬子丙午丁未戊申己酉庚戌辛亥歲後歲對歲前歲位六月丁巳壬子癸丑甲寅乙卯丙辰歲前歲位歲後歲對十二月癸亥丁巳戊午己未庚申辛酉壬戌癸亥歲後歲對歲前歲位右大會望後用之其所領日從本會日起逆數至上會止即得所領日數也隂陽小會堪輿經曰二月小會己酉三月戊辰四月己巳五月戊午八月己卯九月戊戌十月己亥十一月戊子董仲舒曰戌亥近乾為天門辰巳近巽為地户天老曰陽生於子不足於天門隂生於午不足於地户卯酉厭建相對隂陽之關皆以中宫戊巳配其厭建以為隂陽小會也二月陽建於卯隂建於酉隂陽相衝以乙配酉以辛配卯大會皆已有之故以巳配隂建之酉為隂陽小會也三月陽建於辰隂建於申以庚配辰大會有之以乙配申隂陽非耦故以戊配辰為三月小會也四月純陽用事隂勢盡消故無大會以己巳為四月小會也五月陽建隂建俱會於午故以戊配所建之辰則戊午為五月小會也八月秋分建厭分位亦以巳配隂陽建厭之辰故八月以己卯為小會也九月剝卦直月陽消將盡故無大會而以戊戌為小會也十月陽勢消盡純隂用事故無大會則以己亥為十月小會也十一月隂陽二建俱會於子亦以戊配所建之子故十一月戊子為小會也隂陽小會立成月會小會小會所領日春夏秋冬二月己酉丙午丁未戊申歲位歲後歲對歲前三月戊辰癸亥甲子乙丑丙寅丁卯歲位歲後歲對歲前四月己巳戊辰歲前歲位歲後歲對五月戊午丁巳歲前歲位歲後歲對八月己卯甲戌乙亥丙子丁丑戊寅歲對歲前歲位歲後九月戊戌辛卯壬辰癸巳甲午乙未丙申丁酉歲對歲前歲位歲後十月己亥戊戌歲後歲對歲前歲位十一月戊子乙酉丙戌丁亥歲後歲對歲前歲位又小會望前用之其所領日亦從本會日逆數至他大小會止曹震圭曰大會者是月內隂陽正會之辰也小會者是隂陽偶會之辰也故為上吉之日比和之辰按大會者陽會於隂也小會者隂會於陽也其月無大會者以其干支不能相配如三月辰中之乙不能配隂建之申四月巳中之丙不能配隂建之未是也小會為隂會陽故其日皆用陽建惟二月八月隂陽二建對衝故相易也其月無小會者以其日大會已有之或他月小會已有之觀其所領日逆至他月大小會日則止可見矣天子用日堪輿經曰天子用歲位之日以陽建之方為之如春三月建寅卯辰即以正二三月大小會日為歲位也皇后用日太子諸侯同皇后太子諸侯用歲前之日以王前之會為之如春木旺在東方則以冬月為歲前之會也卿大夫用日卿大夫用歲對之日以建王所衝為之如春三月建王東方寅卯辰衝在西方申酉戌故春三月以秋為歲對也士庶用日士庶用歲後之日以王後之會為之如春王東方以夏為歲後之會也大小會並同行狼了戾孤辰附天寶厯曰過為行狼不及為了戾不合為孤辰堪輿經曰三月陽建於辰隂建於申陽前不及於丙隔於己也後過於甲隔於卯也故以甲配申則不從以丙配申不及以戊庚壬配申則不合故甲申為行狼丙申為了戾戊申庚申壬申為孤辰也四月陽建於己隂建於未陽前不及於丁隔於午也後過於乙隔於辰也故以乙配未則不從以丁配未則不及以己辛癸配未則不合故乙未為行狼丁未為了戾己未辛未癸未為孤辰也九月陽建於戌隂建於寅陽前不及壬隔於亥也後過於庚隔於酉也故以庚配寅則不從以壬配寅則不及以甲丙戊配寅則不合故庚寅為行狼壬寅為了戾甲寅丙寅戊寅為孤辰也十月陽建於亥隂建於丑陽前不及癸隔於子也後過於辛隔於戌也故以辛配丑則不從以癸配丑則不及以乙丁巳配丑則不合故辛丑為行狼癸丑為了戾乙丑己丑丁丑為孤辰也曹震圭曰月建者陽也月厭者隂也陽主干隂主支若得陽建前後近干以配隂建者大會也若以陽建後隔位之干配隂建者為行狼不從乃陽氣不從也陽建前隔位之干配隂建者為了戾不及是陽氣不及也以隂建左右之干自配者為孤辰非其正應隂自配也故曰不合單隂自單隂至純陽四位皆以時無大會故以戊巳配月建為之出堪輿經三月卦得夬謂五陽爻對一隂爻故戊配辰為單隂也純隂十月卦得坤謂六爻皆隂陽氣已盡故以己配亥為純隂也孤陽九月卦得剝謂五隂爻對一陽爻故以戊配戌為孤陽也純陽四月卦得乾謂六爻皆陽隂氣己盡故以己配己為純陽也歲薄四月陽建於已而左行隂建於未而右行隂陽相向欲合於午故以丙午戊午為四月歲薄也十月陽建於亥而左行隂建於丑而右行隂陽相向欲合於子故以壬子戊子為十月歲薄也曹震圭曰薄者迫也隂陽二建交相迫之丙壬則近子午之干戊者謂時無大會皆以戊巳配之也逐陳六月陽建於未而左行隂建於巳而右行隂陽相背分别於午故以戊午丙午為六月逐陳十二月陽建於丑而左行隂建於亥而右行隂陽相背分别於子故以壬子戊子為十二月逐陳曹震圭曰隂陽二建此月相分背各隨其陳也隂陽交破四月陽建於已破於亥隂建於未破於癸癸陽也為隂所破也亥隂也為陽所破也是謂陽破隂隂破陽故四月癸亥為隂陽交破十月陽建於亥破於己隂建於丑破於丁丁陽也為隂所破也己隂也為陽所破也是為陽破隂隂破陽故十月丁巳為隂陽交破隂陽擊衝五月隂陽俱至午陽建挾丙而擊壬隂建居午而衝子故五月以壬子為隂陽擊衝十一月隂陽俱至子陽建挾壬而擊丙隂建居子而衝午故十一月以丙午為隂陽擊衝陽破隂衝六月陽建於未而破丑隂建於己而衝癸故六月癸丑為陽破隂衝也十二月陽建於丑而破未隂建於亥而衝丁故十二月丁未為陽破隂衝也隂位三月陽建於辰隂建於申故三月庚辰月宿在辰為隂位九月陽建於戌隂建於寅故九月甲戌月宿在戌為隂位隂道衝陽二月陽建於卯而衝酉隂建於酉而衝卯故二月己卯月宿在卯為隂道衝陽八月陽建於酉而衝卯隂建於卯而衝酉故八月以巳酉月宿在酉為隂道衝陽三隂正月破在申一隂也厭在戌二隂也辛在其間三隂也故正月得辛卯月宿在卯為三隂也七月破在寅一隂也厭在辰二隂也乙在其間三隂也故七月得乙酉月宿在酉為三隂也陽錯以陽建之支配當方之干隂陽自相配合為日以值所衝之宿為陽錯如正月陽建在寅近於甲支干相配為甲寅日寅衝於申故正月甲寅之日月宿在申為陽錯二月陽建在卯近於乙支干相配為乙卯日卯衝於酉故二月乙卯之日月宿在酉為陽錯三月陽建在辰近於甲支干相配得甲辰日辰衝於戌故三月甲辰之日月宿在戌為陽錯也餘倣此隂錯以隂建之支配當方之干隂陽自相配合為日以值所衝之宿為隂錯如正月隂建於戌近於庚支干相配為庚戌日戌衝辰故正月庚戌之日月宿在辰為隂錯二月隂建於酉近於辛支干相配為辛酉日酉衝卯故二月辛酉之日月宿在卯為隂錯三月隂建在申近於庚支干相配為庚申日申衝寅故三月庚申之日月宿在寅為隂錯餘倣此唯五月十一月隂陽二建會於子午故無隂錯陽錯隂陽俱錯五月十一月隂陽二氣同建一辰則以所建之支配所近之干共為一日月宿居月建所衝之辰為隂陽俱錯如五月隂陽二建合於午近於丙配為丙午月宿在子為隂陽俱錯十一月隂陽二建合於子近於壬配為壬子月宿在午為隂陽俱錯也絶隂絶隂者謂三月四月隂氣絶也故三月小會所領日為四月絶隂所領日絶陽絶陽者謂九月十月陽氣絶也故九月小會所領日為十月絶陽所領日立成曹震圭曰以上諸日雖遇天德月德玉堂生氣黃道吉星值日亦不可用集正所謂陰陽不足之辰是也忌興造嫁娶上官赴任入宅遷移出行交易合藥問病百事不宜按以上立成所載等日皆從陰陽二建起論於選擇他書無所見姑附於此御定星厯考原卷五
