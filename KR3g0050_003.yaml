body:
  text: 欽定四庫全書御定星厯考原卷三月事吉神天道乾坤寶典曰天道者天之元陽順理之方也其地宜興舉衆務向之上吉廣聖厯曰天道正月九月在南方二月在西南方三月七月在北方四月十二月在西方五月在西北方六月十月在東方八月在東北方十一月在東南方也按天道者天德所在之方也義見下節天德乾坤寶典曰天德者天之福德也所理之方所直之日可以興土功營宫室堪輿經曰天德者正月丁二月坤三月壬四月辛五月乾六月甲七月癸八月艮九月丙十月乙十一月巽十二月庚曹震圭曰四孟之月以隂干為天德者是天道惠其未生也正月丙火生而丁火未生四月庚金生而辛金未生七月壬水生而癸水未生十月甲木生而乙木未生故以隂干為德也四季之月以陽干為天德者是天道惠其自墓也三月壬水墓六月甲木墓九月丙火墓十二月庚金墓故以陽干為德也四仲之月以四維之卦為德者是天道變化成功也二月萬物將生致役乎坤也五月隂氣將生乾道變化也八月萬物將收成言乎艮也十一月隂氣散陽氣入巽入也風以散之也按天德者三合之氣也如正五九月建寅午戌合火局故以火為德正月丁九月丙五月乾戌火墓在乾宫也二六十月建卯未亥合木局故以木為德六月甲十月乙二月坤未木墓在坤宫也三七十一月建辰申子合水局故以水為德三月壬七月癸十一月巽辰水墓在巽宫也四八月十二月建巳酉丑合金局故以金為德四月辛十二月庚八月艮丑金墓在艮宫也寅申己亥月乃五行長生之位故配隂干辰戌丑未乃五行墓庫之位故配陽干子午卯酉乃五行當王之位故以配墓辰本宫之卦不用支而用干者支地也干天也名曰天德故用天干又用四卦以代辰戌丑未者不用地支故也月德天寶厯曰月德者月之德神也取土修營宜向其方宴樂上官利用其日厯例曰月德者正五九月在丙二六十月在甲三七十一月在壬四八十二月在庚曹震圭曰月德者月中之陽德也故幹為尊枝為卑是臣求君德也以三合五行陽幹為德假令寅午戌三合為火以丙為德是各求自旺之幹為應助也餘倣此天德合天寶厯曰天德合者合德之神也所理之方宜營構宫室修築城垣所直之日宜覃恩賜赦命將出師禱禮山川祈請福願厯例曰天德合者正月壬三月丁四月丙六月己七月戊九月辛十月庚十二月乙是也四仲之月天德居四維故無合也按天德合者即各以其月天德所合之干為之月德合五行論曰月德合者五行之精符會為合也所理之地衆惡皆消所直之日百福並集利以出師命將上册受封祠祀星辰營建宫室厯例曰月德合者正五九月在辛二六十月在巳三七十一月在丁四八十二月在乙按月德合者即各以月德所合之干為之月空天寶厯曰月空者月中隂德之神所理之地宜會親姻安産室所直之日宜設籌謀定計策陳剝利害獻封表章厯例曰月空者正五九月壬二六十月庚三七十一月丙四八十二月甲曹震圭曰月空者月內不掌吉凶待時而動之神也蓋寅午戌月火王用事壬水無用亦不能克火王也故謂之月空餘倣此天恩天寶厯曰天恩者施德寬下之辰也天有四禁常開一門甲為陽德配巳成養育之功故甲配子己配卯酉各五日而為恩也南方衰謝之地無施之方故不配之萬物非土不生故以巳土配甲成功其日可以施恩賞布政事恤孤惸興宴樂厯例曰常以甲子至戊辰己卯至癸未己酉至癸丑凡一十五日曹震圭曰天有四禁子午卯酉也子為元武門午為明堂門卯為日門酉為月門蓋聖人居明堂而治天下故常開此門易所謂聖人南面聽天下嚮明而治者也甲為乾之納甲巳為離之納甲先天乾居正南後天離居正南故以甲配子己配卯酉然則不配午者以甲巳皆南方卦之納甲也各進五辰而不及六者謂五為君位中央之數不可過也故各配五日合之成一十有五為天恩上吉日天赦天寶厯曰天赦者赦過宥罪之辰也天之生育甲與戊地之成立子午寅申故以甲戊配成天赦其日可以緩刑獄雪寃枉施恩惠若與德神會合尤宜興造厯例曰春戊寅夏甲午秋戊申冬甲子是也曹震圭曰天赦者乃天之赦過宥罪之神也生萬物者土也土之所居者四季也助土而成功者甲巳也子午者隂陽氣爭之辰是其罪也寅申者隂陽否泰之辰是其過也至此四辰天道憫其罪過故以甲巳配合而助以赦之辰戌者陽土也以甲配之春起甲戌秋起甲辰丑未者隂土也以巳配之夏起己丑冬起己未皆四時長生前一辰順數至當王之陽辰是也按天赦為赦過之辰則非以子午寅申為罪過也蓋子午寅申者乃四時當王之陽辰甲戊於十干中為最尊所謂甲為諸神之首戊以助甲成功也故以配其日皆取干不克支有上能生下之意如戊寅木非土不生也甲午木生火也戊申土生金也甲子雖非相生若戊子則以土克水故以甲配之且甲木生於亥水亦生木也故曰天赦母倉天寶厯曰母倉者五行當王所生者為母倉如遇土王後則以己午為之其日宜養育羣畜栽植種蒔厯例曰春亥子夏寅卯秋辰戌丑未冬申酉土王後己午曹震圭曰生我者為母積藏者為倉故以名之各以生當時五行之辰為之按春屬木水生之故以亥子為母倉也餘倣此不用干而用支者支為地有母道焉萬物生於土有藏道焉月恩五行論曰月恩者陽建所生之干也子母相從謂之月恩其日宜營造婚姻移徙祭祀上官納財厯例曰月恩者正月丙二月丁三月庚四月己五月戊六月辛七月壬八月癸九月庚十月乙十一月甲十二月辛曹震圭曰月恩者子母相從是月建反生於彼蓋母生我我生子之義按正月寅陽木生丙陽火二月卯隂木生丁隂火則各從其類也餘倣此生氣五行論曰生氣者極福之神也其日宜修築城壘開道溝渠起土修營養育羣畜種蒔如出軍戰陳則宜背之厯例曰生氣者常居月建後二辰曹震圭曰生氣者萬物所生之辰也生育萬物者土也土之所居者四季也四季者乃四時五行所衰之辰也自衰然後可生彼故以四時前季辰為生物之位假令冬水生春木水衰於丑生木於前木之長生在亥也木衰於辰生火於前火之長生在寅也火衰於未生金於前金生於巳也金衰於戌生水於前水生於申也皆各居其後二辰此其義也按月建乃當王之氣不可以衰言也且生氣亦不專在四維之位亦不可專以五行之長生言也大抵月建者當正王之位而前二辰巳有生氣是未旺而將旺者也如正月為三陽之月而子則一陽己生是為生氣也可與王日官日參看益明天喜總要厯曰天喜者慶喜之神也其日宜封建宴樂策試賢良納采問名拜官慶賜厯例曰春午夏丑秋辰冬未曹震圭曰天喜者四時天道喜愛之辰也萬物之喜愛者無比於子母謂春木生火為子以火王於午為天喜也夏火生土土無正位遂以火為生金實四時代謝之理洞源經云火不克金何王是也故以金為子金之所居者丑以丑為天喜也秋金生水為子水之所居者辰以辰為天喜也冬水生木為子木之所居者未以未為天喜也火不喜其所居而喜其王者春氣發泄萬物始生未成體實而無所居故取王為喜也别隂陽家亦以所居為天喜按通書所載春皆以戌為天喜蓋春木生火火墓於戌也餘曹氏之説得之天倉總要厯曰天倉者天庫之神也其日可以修倉庫受賞賜納財牧養厯例曰天倉者正月起寅逆行十二辰曹震圭曰倉者藏也月建私藏之神也蓋建寅之月天地交泰隂陽各半而氣同故共藏於本建至二月隂陽氣離則建事於前私藏於後故厯丑逆行至七月隂陽否其氣又同隂陽各半亦同藏於申也天馬神樞經曰天馬者天之驛騎也其日宜拜公卿擇賢良宣布政事逺行出征李鼎祚曰天馬者正月起午順行六陽辰曹震圭曰天馬者是乾體六陽用事之神也建戌之月剝卦直事惟餘上九一陽爻辭云碩果不食是陽不可以盡剝故建戌之月復得本位為乾之世爻易云乾為天為馬因以名之按乾卦納子寅辰午申戌從初九順配之天馬則四十月在子意者四月乾卦十月建亥又在乾宫故以配乾之初九歟與曹氏之説相發又按午為馬故正月起午馬健行故順歷六陽辰又天馬與白虎同見後驛馬神樞經曰驛馬者驛騎也其日宜封贈官爵詔命公卿逺行赴任移徙遷居李鼎祚曰驛馬者正月起申逆行四孟曹震圭曰驛馬者五行將病得見妻子似人值困途逢妻子者也假令寅午戌火也病於申中有庚為妻戊為子故以申為馬申子辰水也病於寅中有丙為妻甲為子亥卯未木也病於巳中有戊為妻丙為子巳酉丑金也病於亥中有甲為妻壬為子也洞源經云既病見子驛馬到來天醫總要厯曰天醫者天之巫醫其日宜請藥避病尋巫禱祀厯例曰天醫者正月起戌順行十二辰曹震圭曰天醫者三合後辰能使萬物死而復生損而復益如正月建寅三合為寅午戌而戌為寅之後辰是也餘倣此六合神樞經曰六合者日月合宿之辰也其日宜會賓客結親姻立契券合交易李鼎祚曰正月在亥逆行十二辰按六合者月建與月將相合也義見第一卷三合曾門經曰三合者異位而同氣也寅午戌火之三合巳酉丑金之三合申子辰水之三合亥卯未木之三合其日宜結會親姻和合交易修營起土立木上梁厯例曰正月在午戌二月在未亥三月在子申四月在丑酉五月在寅戌六月在卯亥七月在子辰八月在丑巳九月在寅午十月在卯未十一月在辰申十二月在丑巳按三合者各與其月建會成三合局也義見第一卷福德總要厯曰福德者月中福德之神也其日宜祀神祗求福願修宫室獻封章厯例曰福德常居月建前二辰曹震圭曰建前二辰者是月所生之子以其當相氣在前為引與我能為福為德之神也故易卦以子孫爻為福德其義一也大抵子能制乎鬼使不害巳故為福德假令正月寅以火生辰土為子其土能制水鬼也二月卯木生巳火為子火能制金鬼也三月辰之衰木能生午火為子去制金鬼也餘倣此按十二地支各有所藏若以前二辰為月建所生者亦無不合則生氣之在月建前二辰亦當取此義五冨總要厯曰五冨者冨盛之神也其日宜興舉運動估市經求厯例曰正月起亥順行四孟曹震圭曰五冨者月中餘盛之神也蓋寅午戌月火王喜亥中甲木而生申子辰月水王愛巳中庚金而生亥卯未月木王求寅木相助巳酉丑月金王求申中庚金相益故曰餘盛此其義也吉期總要厯曰吉期者吉慶之神也所直之日宜出軍行師攻城寨興弔伐會親姻厯例曰常居月建前一辰也曹震圭曰吉期者是月建腹心同契之侍臣也蓋常居建前一辰可與要約吉事故因名之要安樞要厯曰要安者月中吉神也所直之日宜安撫邊境修葺城隍厯例曰要安者正月寅二月申三月卯四月酉五月辰六月戌七月巳八月亥九月午十月子十一月未十二月丑也曹震圭曰要安者要而用之可得安也蓋陽建之月厯寅卯辰巳午未隂建之月厯申酉戌亥子丑也如是則陽辰之月用陽氣通泰之辰隂辰之月用隂氣柔和之辰類易卦之六爻剛柔相應之象玉宇樞要厯曰玉宇者月中貴神也所直之日宜修宫闕繕亭臺結婚姻會賓客厯例曰正月卯二月酉三月辰四月戌五月巳六月亥七月午八月子九月未十月丑十一月申十二月寅曹震圭曰玉宇者月建所安之室也卯酉者日月之門分界之位東南方陽位也為外為前故陽建居之西北方隂位也為內為後故隂月居之似人之居處男居於前女居於後也金堂樞要厯曰金堂者月中善神也所直之日宜營建宫室興造修築厯例曰正月辰二月戌三月巳四月亥五月午六月子七月未八月丑九月申十月寅十一月酉十二月卯曹震圭曰金堂者建神安樂之堂也常在玉宇之前似王公建修宅第之次序也敬安樞要厯曰敬安者恭順之神也所直之日宜睦親族敘尊卑納禮儀行慶賜厯例曰敬安者正月未二月丑三月申四月寅五月酉六月卯七月戌八月辰九月亥十月巳十一月子十二月午曹震圭曰敬安者是隂陽相會之義也陽會隂而必敬隂會陽而必恭若恭而敬必得安也蓋未申酉戌亥隂氣用事之辰故陽辰之月會之丑寅卯辰巳陽氣用事故隂辰之月會之子午隂陽爭故自會也其義如此普護樞要厯曰普護者福廕之神也所直之日宜祭祀禱祠尋醫避病厯例曰普護者正月申二月寅三月酉四月卯五月戌六月辰七月亥八月巳九月子十月午十一月丑十二月未曹震圭曰普護者乃月中普護萬物無偏私之神也常與要安相對蓋申酉戌亥子丑乃隂權否窒之位與陽建之月相配寅卯辰巳午未乃陽氣通泰之位與隂建之月相配是月內隂陽暗有相護之神也福生樞要厯曰福生者月中福神也所直之日宜祈福求恩祀神致祭厯例曰福生者正月酉二月卯三月戌四月辰五月亥六月巳七月子八月午九月丑十月未十一月寅十二月申曹震圭曰福生者月內祈求福願之神也故與玉宇相對謂玉宇為月建之所安向之則所以邀福月建顧其所向亦所以造福也聖心樞要厯曰聖心者月中福神也其日宜上表章行恩澤營百事厯例曰聖心者正月亥二月巳三月子四月午五月丑六月未七月寅八月申九月卯十月酉十一月辰十二月戌曹震圭曰勞而不敢安者聖人之心也蓋陽辰之月順理陽卦之位隂辰之月順治隂卦之位聖人居中治理八方隂陽各當使君子小人無交錯也初寅之月起於乾宫亥者是順天之道也按正三五七九十一為陽建之月故從亥至辰配乾坎艮震四陽卦二四六八十十二為隂建之月故從巳至戌配巽離坤兌四隂卦益後樞要厯曰益後者月中福神也所直之日宜造宅舍築垣牆行嫁娶安産室厯例曰正月子二月午三月丑四月未五月寅六月申七月卯八月酉九月辰十月戌十一月巳十二月亥曹震圭曰益後者於子嗣有補益之神也子丑寅卯辰巳為陽氣之位以陽建之月配之午未申酉戌亥為隂氣之位則以隂建之月配之隂陽會和既生男女當夫訓其男婦教其女使男從夫道女從婦德各從其道當有益於將來故云益後續世樞要厯曰續世者月中善神也所直之日宜結婚姻睦親族祀神祗求嗣續厯例曰續世者正月丑二月未三月寅四月申五月卯六月酉七月辰八月戌九月巳十月亥十一月午十二月子是也按續世者月中繼續之神也常在益後後一辰蓋亦與玉宇金堂之相連者同意又按自要安至續世凡九神其起例皆以六隂月與六陽月對衝如正月寅則二月申正月卯則二月酉是也餘倣此天后總要厯曰天后者月中福神也所直之日宜求醫療病祈福禮神厯例曰天后正月起申逆行四孟曹震圭曰天后者驛馬也是五行受病復見妻子反有救助而有食有養也似困而得馬飢而得食也假命寅午戌火以申為妻為馬及有生戊為食也故曰天后后者主生育萬物為萬物之母故因名之天巫總要厯曰天巫者月中善神也所直之日宜合藥請醫祀鬼神求福願厯例曰常居月建前二辰曹震圭曰天巫者月中善神能克除鬼殺也義與福德同天願總要厯曰天願者月中善神也所直之日宜嫁娶納財敦睦親族厯例曰天願者正月甲午二月甲戌三月乙酉四月丙子五月丁丑六月戊午七月甲寅八月丙辰九月辛卯十月戊辰十一月甲子十二月癸未曹震圭曰天願者乃月建枝德合神也陽前隂後五辰各以陽干配之四季月以隂干配之若遇四孟及丑未子午者無合蓋謂亥巳為隂陽終極之辰寅申為隂陽否泰之辰丑未為隂陽絶蔑之辰子午為陽消隂長之辰故不可為合也十干巳為六賊庚為白虎壬為元武故不可用也若逢忌用之辰以前後近者用之假令正月未為枝德今忌用取近未者午以王干甲配之得甲午也二月甲戌三月乙酉四月丙子五月忌亥退合丑就以丁配故得丁丑六月忌寅就午六合以戊配得戊午七月否建之辰忌丑就寅寅中有甲從其泰也八月忌庚用丙謂金生於己巳中有丙火也配得丙辰九月辛卯十月忌壬以戊之陽土能聚水潰易有比卦之義故得戊辰十一月以其自建者謂前後皆無所配然建子之月未可假力於人其忌壬用甲者是待其子有所助也十二月忌申以就近申之未故得癸未其義如此四相總要厯曰四相者四時王相之辰也其日宜修營起工養育生財栽植種蒔移徙逺行厯例曰春丙丁夏戊巳秋壬癸冬甲乙曹震圭曰四相者養育之道母生子也春木王生丙丁夏火王生戊巳秋金王生壬癸冬水王生甲乙惟庚辛者金也能殺萬物故不用四時天德總要厯曰四時天德者四序中德神也其日宜慶賜宴樂拜官賞賀厯例曰春午夏辰秋子冬寅曹震圭曰子寅辰午乃東方生育之陽辰故用事吉也申戌者西方之殺氣故不可用也各以四時所生之陽辰而為之是我生者為德也亦名時德按時德與四相同義春木生午火夏火生辰土秋金生子水冬水生寅木也四相取天干時德取地支陽德總要厯曰陽德者月中德神也所直之日宜交易開市結親姻厯例曰正月起戌順行六陽辰曹震圭曰陽德者乾陽之道也陽道不可以盡剝故正月起戌應乾之上九戌者乾之世爻又五月一隂生即配於午順厯乾之六爻六陽月居於寅午戌火炎上為尊為夫也六隂月臨於申子辰水潤下為卑為婦也故所直之日長幼有序夫婦有别是嘉會合禮之辰故宜如此隂德總要厯曰隂德者月內隂德之神也所直之日宜施隂隲行惠愛雪寃枉舉正直厯例曰正月起酉逆行六隂辰曹震圭曰隂德者是月中坤隂之道也正月起於酉應坤之上六酉者坤之世爻故從酉逆厯坤之六爻坤者厚德載物也含𢎞光大萬物資生故宜如此解神總要厯曰解神者月中善神也所直之日宜上詞章雪寃枉厯例曰正二月申三四月戌五六月子七八月寅九十月辰十一月十二月午也曹震圭曰解神者月中對奏直諫之臣也常居與月建相對之陽辰與太嵗中奏書一義蓋忠直之臣不處私隂之位也六儀神樞經曰六儀者月中吉神也所直之日宜牧養生財栽植樹木結親納禮視事臨官厯例曰正月起辰逆行十二辰曹震圭曰六儀者月中內正禮儀使隂建無敢私邪之神也月厭主事暗昧不正之神故六儀與敵衝以威厲之使不敢妄失儀容也因以名之常與隂建對衝者是也時陽總要厯曰時陽者月中陽神也所直之日宜敘婚姻行宴樂厯例曰常居月建後二辰曹震圭曰時陽者月內掌陽氣之神父夫之象故陽之主事威儀正直有禮義儀容故其日宜敘婚姻行宴樂其起例見下節時隂總要厯曰時隂者月中隂神也所直之日宜運謀算畫計策睦子孫會親友厯例曰常居月建前四辰曹震圭曰時隂者月內隂氣之神母婦之象故隂神主事機密不測故其日宜運謀算畫計策會親友睦子孫起例常以月建加功曹子上所得之辰為時陽午上所得之辰為時隂謂子者一陽初生也故時陽取焉午者一隂初生也故時隂取焉寅者艮方成終成始之位三陽交泰之所故以加之太乙家常以計神加和德其義一也兵吉兵福兵寶總要厯曰兵吉兵福兵寶者皆月內用兵之吉辰也其日宜出師命將攻伐略地厯例曰兵吉者正月子丑寅卯二月亥子丑寅三月戌亥子丑四月酉戌亥子五月申酉戌亥六月未申酉戌七月午未申酉八月巳午未申九月辰巳午未十月卯辰巳午十一月寅卯辰巳十二月丑寅卯辰兵福者與月建同行兵寶者月建前一辰也曹震圭曰兵吉逐月漸退一辰者是兵家無有妄進無有躁動之意故云兵者不祥之器不得已而用之也又易卦師之六四曰師左次無咎言左次則為退舍也故見可而進知難而退師之常也又太白隂經曰未見而戰雖衆必潰見利而戰雖寡必勝是兵家不可以妄舉輕進此隂陽之戒也兵福兵寶者乃當時王相之辰也太白陽經曰五帝所在不可出軍向之必敗春東方夏南方秋西方冬北方又云春不東行是謂伐生百事不成夏不南行是謂伐強兵卒多殃秋不西行是謂伐熟兵將不復冬不北行是謂伐藏士卒多傷故月建所在為王相之方我用而我利也王日官日相日民日守日壇經曰王官相民守日者皆月內視事之吉辰也所直之日宜命將登壇襲爵受封上官赴任臨政親民厯例曰王日者春寅夏巳秋申冬亥今易為官日官日者春卯夏午秋酉冬子今易為王日相日者春巳夏申秋亥冬寅民日者春午夏酉秋子冬卯守日者春酉夏子秋卯冬午曹震圭曰王日者四時正王之辰四正之位帝王之象故得其政治也官日者四時臨官之辰諸侯之象相日者四時官日所生也相氣之辰宰相之象民日者四時死絶之辰庶民之象守日者四時胎絶之辰無氣能自固守以待將來各取其義以為名也天寶天對天玉天嶽天符執儲樞要厯曰天寶天對天玉天嶽今疑天嶽非吉神天符執儲皆月內明星也所直之日各宜修宫室繕城郭納親禮進人口厯例曰天寶者正月起辰天嶽者正月起申天符者正月起戌皆順行六陽辰天對者正月起已天玉者正月起未執儲者正月起丑皆順行六隂辰曹震圭曰此天黃道也蓋天者萬物之主黃者中央之色道者乃天皇居九重之內出入所履之道也故名曰天黃道其神逐年月日各有所主易傳云乾為天為君為父是天皇之正位也主御羣靈司萬物生死故曰司命亦能掌握萬物故又名曰天符今皆作天府此乾卦之主也初行其道起於戌是乾之世爻納甲也其對衝巽宫為明堂是天皇治事之宫也聖人南面而聽天下故以巽為明堂又名曰執儲是天皇所操執以除暴虐也故曰齊乎巽初行其道起於丑是巽之初爻納甲也其明堂之左有青龍宰相之象是震宫也震為雷為龍故曰青龍又名曰雷公初行其道起於子是震之初爻納甲也其明堂之前有朱雀是離宫也又曰飛流故離為火朱雀飛流之象初行其道起於卯是離卦初爻納甲也其明堂之右有白虎將軍之象又曰天棒是天皇之先驅也又曰天馬是天皇之所乘也初行其道起於午是震卦外體之納甲也謂震為大臣之象向外則為將軍也其天皇之右有玉堂是天皇寢安之宫天后之位是坤宫也又曰天玉是天皇寵愛之所初行其道起於未是坤之初爻納甲也天皇之左有金匱是寶藏之府庫艮之位也又曰天寶初行其道起於辰是艮卦初爻納甲也天皇右旁有天德兌也是天皇施仁布德喜樂之宫又曰天對是天皇納諫聽政論道經邦之所初行其道起於巳是兌之初爻納甲也天皇左旁有天刑坎也勞卦也是掌刑罰之所又曰蚩尤蚩尤者虐民之神初行其道起於寅坎之初爻納甲也白虎天棒之後有天牢又曰天獄是囚禁之所也配之朱雀明堂之間蓋使刑禁明而無私也初行其道起於申是坎之外體納甲也故云勞乎坎也天皇天牢之間有元武又曰隂私是邪妄之臣故論正道必有讒言舉正直則邪妄亦進易卦爻辭半君子半小人則天下之道然也初行其道起於酉是離卦外體納甲也故離為朱雀飛流皆小人之輩也中宫之位有勾陳是天皇嬪妃之位天帝之所居也初行其道起於亥是乾宫之隂辰兌宫之外體納甲也蓋兌者説也是天皇喜悅之宫也故用配焉又曰天嶽疑是天獄嶽者山之高地祗也在天必無此雷公本吉神也非凶神也今故以天嶽為天獄凶神以雷公可為吉神又曰易卦納甲各有逆順今六隂之神亦順者謂奉上之禮不可以逆其情是天道順動而無逆也按曹氏之説合黃黑二道而論之也其次序起例并見第五卷青龍明堂金匱天德玉堂司命神樞經曰青龍明堂金匱天德玉堂司命皆月內天黃道之神也所直之日皆宜興衆務不避太嵗將軍月刑一切凶惡自然避之李鼎祚曰青龍正月起子金匱正月起辰司命正月起戌皆順行六陽辰也明堂正月起丑天德正月起巳玉堂正月起未皆順行六隂辰也曹震圭曰明堂即執儲金匱即天寶天德即天對玉堂即天玉司命即天府其名雖異其理一也義見前篇枝德經曰枝德者地支帶德也所直之日宜修造築垣厯例曰枝德者正月在未順行十二辰義見第二卷嵗枝德節寶日義日制日經曰寶日者幹生枝也義日者枝生幹也制日者幹克枝也其日利行軍厯例曰寶日者丁未丁丑丙戌甲午庚子壬寅癸卯乙巳戊申己酉辛亥丙辰義日者甲子丙寅丁卯己巳辛未壬申癸酉乙亥庚辰辛丑庚戌戊午制日者乙丑甲戌壬午戊子庚寅辛卯癸巳乙未丙申丁酉己亥甲辰是也曹震圭曰幹生枝者得其天時也枝生幹者得其地利也幹克枝者得其人和我可制彼也故幹為天為我枝為地為彼也大明唐李淳風將諸家隂陽書總集一十五日謂之大明其日宜舉動百事厯例曰大明者辛未壬申癸酉己卯壬午甲申壬寅甲辰丙午己酉庚戌丙辰己未庚申辛酉是也曹震圭曰不用亥子丑巳四枝乙丁戊三幹者何也蓋子丑北方之位隂陽始立之辰其道暗故不用也亥巳為隂陽極終之位反於不顯亦不用也乙為草族其體不真丁為灰火其光不照戊為王土其體不動故不用也其餘十四日各有所論如寅午戌火也甲土也土中之火不顯也卯未木也癸為隂微之火居木中有煙無焰也辰戌王土也壬為水也若相加則兩無成也寅戌火未盛也丙從水滅微火也寅午戌火庚金也相加則虧損也辛卯丙申亦然七聖日唐賈耽集黃帝元女文王周公孔子天老董仲舒通用之日謂之七聖總三十七日其日宜興動百事七聖者丙寅丁卯戊辰己巳壬申癸酉甲戌乙亥丙子丁丑庚辰辛巳甲申乙酉戊子己丑庚寅辛卯甲午乙未戊戌己亥壬寅癸卯甲辰乙巳戊申己酉庚戌壬子癸丑甲寅乙卯戊午己未庚申辛酉神在日唐賈耽總集三十五日為之神在其日宜禱祠祭祀實受其福神在日者甲子乙丑丁卯戊辰辛未壬申癸酉甲戌丁丑己卯庚辰壬午甲申乙酉丙戌丁亥己丑辛卯甲午乙未丙申丁酉乙巳丙午丁未戊申己酉庚戌乙卯丙辰丁巳戊午己未辛酉癸亥曹震圭曰子者隂陽未顯禍福未分故不獲福也惟甲子乃隂陽始建之辰羣靈皆在故宜用焉寅者陽氣發泄之辰隂氣消盡之位鬼神者隂氣也消滅則亡故不在焉亥巳者隂陽極終之辰亦不受福也惟乙巳丁巳陽光相助丁亥癸亥隂氣暗助此四辰亦可祭也壬癸者隂氣水也鬼神之屬也四季者墓土也若相加得壬辰壬戌癸丑癸未此四日是鬼神自受克制故不獲福也其餘庚午戊戌辛丑癸卯甲辰庚申此六日未詳其義三厯撮要云舊厯錯誤今依官厯改正未審舊厯為非新厯為是也五合日樞要厯曰五合者月內良日也其日宜結婚姻會親友立券交易厯例曰五合者寅卯日也曹震圭曰十幹者夫之象十二支者婦之象今自子為始以甲相配至酉而止不及戌亥然戌能進五辰配寅中之甲亥能進前五辰配卯中之乙而成夫婦會合之禮故曰五合若其他則進五無所配也雖有辰配申中之庚巳配酉中之辛而申酉反為五離者易曰一隂一陽之謂道雜則相乖合則暌離也故曰五離忌見本節除神按通書以申酉日為除神與五合對衝之日也宜沐浴祓除災眚隂陽不將天寶厯曰隂陽不將者以月建為陽謂之陽建正月起寅順行十二辰月厭為隂謂之隂建正月起戌逆行十二辰分於卯酉會於子午厭前枝幹自相配者為陽將厭後枝幹自相配者為隂將厭後幹配厭前枝為隂陽俱將厭前幹配厭後枝者為隂陽不將也陽將傷夫隂將傷婦隂陽俱將夫婦俱傷隂陽不將夫婦榮昌戊巳之幹位在中央戊為陽將寄於艮已為隂將寄於坤經云春冬巳不將秋夏戊不將厯例曰隂陽不將者正月辛亥辛丑辛卯庚子庚寅己亥己丑己卯丁亥丁丑丁卯丙子丙寅二月庚子庚寅庚戌己亥己丑丁亥丁丑丙子丙戌丙寅乙亥乙丑三月己酉己亥己丑丁酉丁亥丁丑丙戌丙子乙酉乙亥乙丑甲戌甲子四月丁酉丁亥丙申丙戌丙子戊戌戊申戊子乙酉乙亥甲申甲戌甲子五月丙申丙戌戊申戊戌癸未乙酉乙亥甲申甲戌癸未癸酉癸亥六月乙未乙酉戊戌戊申戊午甲午甲申甲戌癸未癸酉壬午壬申壬戌七月乙巳乙未乙酉戊午戊申甲午甲申癸未癸酉癸巳壬申壬午八月甲辰甲午甲申戊辰戊午戊申癸巳癸未壬辰壬午壬申辛巳辛未九月戊辰戊午癸卯癸巳癸未壬辰壬午辛卯辛巳辛未庚辰庚午十月癸卯癸巳己卯己巳壬寅壬辰壬午辛卯辛巳庚寅庚辰庚午十一月壬寅壬辰巳丑己卯己巳辛丑辛卯辛巳庚寅庚辰丁丑丁卯丁巳十二月己丑己卯辛丑辛卯庚子庚寅丁丑丁卯丙子丙寅丙辰庚辰按厭前枝幹自相配者為陽將是純陽無隂也厭後枝幹自相配者為隂將是純隂無陽也厭後幹配厭前枝者為隂陽俱將是隂非其隂陽非其陽則其道相乖也蓋幹為陽當居於前枝為隂當從其後是夫唱婦隨之理故厭前幹配厭後枝為隂陽不將也周堂厯曰大月從夫順數小月從婦逆數值第堂厨竈日宜用之如值翁姑日而無翁姑者亦可用曹震圭曰乾為父故配翁也坤為母故配姑也坎為宅第居北向南也艮為竈丙火長生之位也巽為厨是萬物潔齊之所也離為夫南方陽位男正位乎外也震為婦厨竈之間婦所在也兌為堂在翁姑之間其所安也大月從夫順數小月從婦逆行是夫尊而婦卑陽順而隂逆之理也遇翁姑夫婦者凶第堂厨竈者吉或以第為兄弟之弟誤矣鳴吠日一行云鳴吠者五姓安葬之辰也用之者得金雞鳴玉犬吠上下不呼亡靈安穩子孫冨昌如用破地則於其日擇克姓者用鳴吠日者庚午壬申癸酉壬午甲申乙酉庚寅丙申丁酉壬寅丙午己酉庚申辛酉也曹震圭曰金雞者兌也兌宫酉也玉犬者艮也艮為犬也大抵外宅之要在山澤地勢是坤艮兌也故以坤兌往來加艮順布八卦視艮所臨之辰為良也如兌加艮則艮臨離午也又以離加艮則艮臨兌酉也又以坤加艮則艮臨坤未申也又以艮自加艮丑寅也丑未二辰乃墓絶無氣之位故不可用又十幹之中戊為陽土以配中宫明堂之位不可用也甲午甲寅丙寅者乃自死自旺自生之日故不用止餘一十四日為鳴吠吉日也又地理新書括地圖云去東海有桃都山大桃樹盤曲三千里上有一金雞下有二神人一名鬱一名壘各持葦索用捉不祥之鬼及天將旦日照金雞鳴天下衆雞悉從而鳴金雞鳴訖下食惡鬼金雞鳴時百鬼皆走避也鳴吠對日一行經云鳴吠對日者是五姓外宅用之破土斬草也鳴吠對日者丙寅丁卯丙子辛卯甲午庚子癸卯壬子甲寅乙卯也按鳴吠對者乃與鳴吠對衝之日其己丑日無對衝庚寅與甲申壬寅與丙申又互為對衝故止餘九日今取十日者蓋甲午日雖不用為鳴吠然其對衝庚子可用為鳴吠對也若甲寅之對庚申丙寅之對壬申則鳴吠日中已用之矣惟甲午疑應作甲子蓋甲子本與庚午對衝且既用庚子不宜並用甲午也恐傳者有誤御定星厯考原卷三
