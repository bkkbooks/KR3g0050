body:
  text: 欽定四庫全書御定星厯考原卷二年神方位三元年九星黃帝遯甲經曰三元者起於九宫也以休門為一白死門為二黑傷門為三碧杜門為四綠中宫為五黃開門為六白驚門為七赤生門為八白景門為九紫鬼谷三元歌曰軒轅黃帝戰蚩尤涿鹿經今苦未休偶遇天神授符訣登壇致祭謹虔修神龍負圖出洛水彩鳯銜書碧雲裏因命風后演成文遁甲奇門從此始先須掌上排九宫縱横十五在其中須將八卦輪八節一氣統三為正宗通書云九宫者神龜負文於背禹因以陳九疇即洛書戴九履一左三右七二四為肩六八為足五數居中縱横斜皆成十五者是也河圖則天一地二天三地四天五地六天七地八天九地十而先儒有除十用九之說所謂河圖洛書相為經緯八卦九章相為表裏者也東漢張衡變九章為九宫從一白二黑三碧四綠五黃六白七赤八白九紫分三元六甲以數作方而一白居坎二黑居坤三碧居震四綠居巽五黃居中六白居乾七赤居兌八白居艮九紫居離是為九宫靜則隨方而定動則依數而行按上元甲子中宫起一白中元甲子起四綠下元甲子起七赤三元一百八十年而一週葢一百八十者以宫數九與花甲六十俱可以度盡也逐年逆轉如甲子年中宫起一白乙丑年中宫起九紫而其實甲子年一白在中宫乙丑年一白則在乾六故紫在中宫似逆而實順也以其年所直星入中宫順行九宫如康熈二十三年甲子一白入中宫二黑居乾三碧居兌四綠居艮五黃居離六白居坎七赤居坤八白居震九紫居巽也餘倣此體為地盤用為天盤坤二黑兌七赤乾六白乾六兌七艮八離九離九紫中五黃坎一白中五巽四綠震三碧艮八白巽四震三坤二次一靜則隨方而定動則依數而行三元年九星入中宫康熈二十三年甲子為上元上元中元下元三元太嵗所在一白四綠七赤甲子癸酉壬午辛卯庚子己酉戊午九紫三碧六白乙丑甲戌癸未壬辰辛丑庚戌己未八白二黑五黃丙寅乙亥甲申癸巳壬寅辛亥庚申七赤一白四綠丁卯丙子乙酉甲午癸卯壬子辛酉六白九紫三碧戊辰丁丑丙戌乙未甲辰癸丑壬戌五黃八白二黑己巳戊寅丁亥丙申乙巳甲寅癸亥四綠七赤一白庚午己卯戊子丁酉丙午乙卯三碧六白九紫辛未庚辰己丑戊戌丁未丙辰二黑五黃八白壬申辛巳庚寅己亥戊申丁巳三元月九星上元甲子正月中宫起八白葢年前之十一月甲子起一白十二月起九紫故本年正月起八白也三年而一週葢三年三十有六月以月數十二與宫數之九俱可以度盡也故以子午卯酉年為上元正月起八白辰戌丑未年為中元正月起五黃寅申己亥年為下元正月起二黑亦以其所直星入中宫順行九宫與年九星同三元月九星入中宫上元子午卯酉四仲年中元辰戌丑未四季年下元寅申巳亥四孟年正月八白正月五黃正月二黑二月七赤二月四緑二月一白三月六白三月三碧三月九紫四月五黃四月二黑四月八白五月四綠五月一白五月七赤六月三碧六月九紫六月六白七月二黑七月八白七月五黃八月一白八月七赤八月四綠九月九紫九月六白九月三碧十月八白十月五黃十月二黑十一月七赤十一月四綠十一月一白十二月六白十二月三碧十二月九紫嵗德曾門經曰嵗德者嵗中德神也十幹之中五為陽五為隂陽者君道也隂者臣道也君徳自處臣徳從君也所理之地萬福咸集衆殃自避應有修營並獲福祐廣聖厯曰甲徳在甲乙徳在庚丙徳在丙丁徳在壬戊徳在戊巳徳在甲庚徳在庚辛徳在丙壬徳在壬癸徳在戊按律吕六陽當位自得六隂則居其衝嵗徳則五陽干當位自得五隂干則取其合葢陽以自得為徳而隂以從陽為徳也歲幹合金櫃經曰嵗幹合者天地隂陽配合也主除滅災咎而興福祐也所理之方可以修營起土上官嫁娶逺行參謁厯例曰甲年在己乙年在庚丙年在辛丁年在壬戊年在癸取其與嵗干相合者是也今厯日嵗轉吉神無此條嵗德合按歲德合者嵗徳五合之干是也甲年在己乙年在乙丙年在辛丁年在丁戊年在癸巳年在己庚年在乙辛年在辛壬年在丁癸年在癸故嵗徳屬陽嵗徳合屬隂歲枝德神樞經曰嵗枝德者嵗中德神也德者得也得福之謂也主救危而濟弱所理之方利以興造舉動衆務李鼎祚曰常居嵗前五辰曹震圭曰枝德者從太嵗向前五合之辰也假令嵗在甲子向前見己巳甲與己合即巳為枝徳也又如嵗在丙子向前見辛巳丙與辛合即巳為枝徳也餘倣此今厯日嵗轉吉神無此條太嵗神樞經曰太嵗人君之象率領諸神統正方位幹運時序總成嵗功以上元閼逢困敦之嵗起建於子嵗徙一位十二年一週若國家巡狩省方出師略地營造宫闕開拓封疆不可向之黎庶修營宅舍築壘牆垣竝須迴避黃帝經曰太嵗所在之辰必不可犯爾雅註曰嵗者取嵗星行一次也曹震圭曰太嵗者嵗星也故木星十二年行一周天一年行一次也奏書廣聖厯曰奏書者嵗之貴神也掌奏記主伺察所理之地宜祭祀求福營建宫室修飾垣牆蓬瀛書曰嵗在東方奏書在東北維嵗在南方奏書在東南維嵗在西方奏書在西南維嵗在北方奏書在西北維曹震圭曰奏書者水神也為嵗君之諫臣察私屈揚徳意之神也常居近嵗後維方謂輔佐之道不敢先也初起於乾者順天之道也所理之方可舉賢能於國有益博士廣聖厯曰博士者嵗之善神也掌案牘主擬議所居之方利於興修堪輿經曰博士者常與奏書對衝如奏書在艮博士在坤也曹震圭曰博士者火神也掌天子明堂紀綱政治之神也常處於維方不敢自專也初起於巽者明堂也所理之方可進賢能於國有益力士堪輿經曰力士者嵗之惡神也主刑威掌殺戮所居之方不宜抵向犯之令人多瘟疾明時總要曰嵗在東方力士居東南維嵗在南方居西南維嵗在西方居西北維嵗在北方居東北維曹震圭曰力士者天子之護衞羽林軍也常居嵗前維方不敢逺於君也所在之方可詔此方之臣以誅有罪蠶室堪輿經曰蠶室者嵗之凶神也主絲繭綿帛之事所理之方不可修動犯之蠶絲不收廣聖厯曰蠶室者常與力士對衝曹震圭曰蠶室者蠶神所處也禮記云古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘牆而外閉之及大昕之朝君皮弁素積卜三宫之夫人世婦之吉者使入蠶於蠶室奉種浴於川桑於公桑風戾以食之又月令曰季春之月后妃齋戒親東鄉躬桑禁婦女毌觀省婦使以勸蠶事蠶事既登分繭稱絲効功以供郊廟之服無有敢惰如是觀之則蠶室起於坤坤者玉堂之位后宫之所大川之地也其止巡行四維葢取四季土位取近川之義也所在之方天子庶民皆可祠祀蠶官厯例曰蠶官者嵗中掌絲之神也所理之地忌營構宫室犯之蠶母多病絲繭不收黎幹曰嵗在東方居戌在南方居丑在西方居辰在北方居未按蠶官者大抵公桑蠶室之官使蠶得養也如嵗在東方屬木木養於戌故在戌嵗在南方屬火火養於丑故在丑嵗在西方屬金金養於辰故在辰嵗在北方屬水水養於未故在未也蠶命厯例曰蠶命者掌蠶之命神也所理之地不可舉動百事犯之者主傷蠶絲繭不收黎幹曰嵗在北方居申嵗在東方居亥嵗在南方居寅嵗在西方居巳按蠶命者蠶之所係以生也如嵗在北方屬水水生於申故在申嵗在東方屬木木生於亥故在亥嵗在南方屬火火生於寅故在寅嵗在西方屬金金生於巳故在巳今之蠶命子年未丑年午寅年亥卯年戌辰年己巳年丑午年寅未年申申年卯酉年辰戌年子亥年酉此恐有誤又按萬全廣濟云亥子丑年未坤申寅卯辰年戌乾亥巳午未年丑艮寅申酉戌年辰巽己假如亥子丑年蠶官在未蠶室在坤蠶命在申是也餘倣此太隂神樞經曰太隂者嵗后也常居嵗後二辰所理之地不可興修蓬瀛書曰嵗在四孟則與大將軍合於四仲名曰羣醜曹震圭曰后妃所居者后宫也后宫之星在帝後二星紫微垣北極五星第二為帝星第四為后宫故太隂常居太嵗後二辰子年起戌順行十二辰如子年則在戌丑年則在亥寅年則在子是也大將軍神樞經曰大將軍者嵗之大將也統御威武總領戰伐若國家命將出師攻城戰陣則宜背之凡興造皆不可犯李鼎祚曰孟嵗寅申己亥以勝光午仲嵗子午卯酉以小吉未季嵗辰戌丑未以傳送申加嵗枝上逢天罡辰為大將軍如子年為仲年即以未加嵗枝子上順數至酉得辰即酉為大將軍也餘倣此曹震圭曰大將軍其徳忠直常居四正三年一遷所理之地可以命將帥選威勇以伐不義按大將軍者統御武臣之職有護衞虎賁之象故居四正之位而從嵗君之後如寅卯辰嵗在東方則居正北己午未嵗在南方則居正東申酉戌嵗在西方則居正南亥子丑歳在北方則居正西也嵗刑曾門經曰嵗刑者刑戮之神也金剛火强各守其方木落歸根水流趨末翼奉曰己酉丑金之位刑在西方言金恃其剛物莫與對寅午戌火之位刑在南方言火恃其强物莫與對亥卯未木之位刑在北方言木恃榮華故隂氣刑之使其彫落申子辰水之位刑在東方言水恃隂邪故陽氣刑之使不復歸所以子刑卯丑刑戌寅刑己卯刑子巳刑申未刑丑申刑寅戌刑未辰午酉亥為自刑也廣聖厯曰嵗刑之地攻城陣戰不可犯之動土興工亦須迴避犯之多鬭争按相刑之說翼氏最明葢以己酉丑刑申酉戌則己刑申酉自刑丑刑戌也以寅午戌刑己午未則寅刑己午自刑戌刑未也以申子辰刑寅卯辰則申刑寅子刑卯辰自刑也以亥卯未刑亥子丑則亥自刑卯刑子未刑丑也歲破廣聖厯曰嵗破者太嵗所衝之辰也其地不可興造移徙嫁娶逺行犯者主損財物及害家長惟戰伐向之吉明時總要曰嵗破者子年在午順行十二辰是也嵗殺神樞經曰嵗殺者隂氣尤毒謂之殺也常居四季謂四季之隂氣能遊天上李鼎祚曰寅午戌殺在丑己酉丑殺在辰申子辰殺在未亥卯未殺在戌廣聖厯曰嵗殺之地不可穿鑿修營移徙犯之者傷子孫六畜曹震圭曰月殺者三合五行成形之位所謂養是也大抵物之成形母必有傷故曰殺劫殺神樞經曰劫殺者嵗之隂氣也主有殺害所理之方忌有興造犯之主有劫盜傷殺之事李鼎祚曰寅午戌嵗在亥亥卯未嵗在申申子辰嵗在巳巳酉丑嵗在寅是也義見下節災殺神樞經曰災殺者五行隂氣之位也常居劫殺前一辰主災病疾厄之事所理之方不可抵向營造犯之者當有病患曹震圭曰災殺者三合五行胎神也洞源經曰劫殺起於絶災殺起於克假令申子辰年合水局水絶於已故劫殺在巳胎於午又水與午火相尅故災殺在午也己酉丑年合金局金絶於寅故劫殺在寅胎於卯又金與卯木相尅故災殺在卯也餘倣此按劫殺災殺嵗殺是為三殺如曹氏說則三合五行絶胎養之位也絶胎養者墓庫以後長生以前神樞經所謂隂氣是也或謂三殺者三合五行當旺之衝故有宜向不宜坐之說如申子辰合水局水旺於北方南方其衝也故三殺在南方己午未餘倣此伏兵大禍厯例曰伏兵大禍者歳之五兵也主兵革刑殺所理之方忌出兵行師及修造犯之主有兵傷刑戮之咎黎幹曰寅午戌嵗伏兵在壬大禍在癸亥卯未嵗伏兵在庚大禍在辛申子辰嵗伏兵在丙大禍在丁巳酉丑嵗伏兵在甲大禍在乙是也曹震圭曰伏兵大禍者以三合五行相尅之陽干為伏兵隂干為大禍伏兵災甚大禍災輕然木火以其來尅者金水則以其被尅者葢金為白虎能殺萬物水為元武能終萬物故反以其所尅者為忌也按伏兵大禍夾處於三殺之間如申子辰年三殺在己午未伏兵大禍則在丙丁是也餘倣此官符厯例曰官符者嵗之凶神也主官府詞訟之事所理之方不可興土工犯之者當有獄訟之事常居嵗前四辰曹震圭曰嵗中掌符信之官文權之職也常居三合前辰故前辰為文官後辰為武職假令嵗在寅寅午戌為三合局則午有官符文權也戌有白虎武職也餘倣此畜官廣聖厯曰畜官者歳中牧養之神也主養育羣畜之事所理之方忌造牛欄馬櫪及放牧犯之者損六畜傷財厯例曰居嵗前四辰曹震圭曰畜者養也是養畜之官以待百官之乘驛者也居三合前辰與官符同位大殺厯例曰大殺者嵗中刺史也主刑鬭傷殺之事所理之地出軍不可向之併忌修造犯者主有傷殺明時總要曰子年起子逆行四仲曹震圭曰大殺者是嵗三合五行建旺之辰將星之位名曰刺史按大殺子年在子丑年在酉寅年在午卯年在卯辰年又在子如是逆行四正葢申子辰三合為水水旺於子也己酉丑三合為金金旺於酉也寅午戌三合為火火旺於午也亥卯未三合為木木旺於卯也病符病符者嵗之惡神也主災病疫癘所理之地不可安病人求醫藥及有興造犯之者主多病患常居嵗後一辰曹震圭曰居嵗後一辰是言舊嵗也新嵗將旺舊嵗必衰衰則病也按與死符對衝者為病符其不利可知死符經曰死符者嵗之凶神也所理之方不可營塚墓置死喪及有穿鑿犯之者主有死亡常居嵗前五辰曹震圭曰死符者是太嵗自絶之辰也假令太嵗在子是當旺也則丑為衰寅為病卯為死辰為墓巳為絶也餘倣此五鬼乾坤寳典曰五鬼者五行之精氣也主虚耗疾病驚怪之事所理之方不宜興舉抵向弔喪問病犯之主財物耗亡家招怪異厯例曰子年在辰逆行十二辰曹震圭曰辰與子水之精丑與卯木之精未與酉金之精午與戌火之精寅申己亥土之精謂土能生育萬物四孟為五行長生之辰也故子年在辰逆行自然相合也按曹氏五行之說未確以理求之殆以嵗序起子而順行二十八宿起辰而逆行順者為陽為人逆者為隂為鬼各以其數之起處轉而相應也大耗厯例曰大耗者嵗中虚耗之神也所理之地不可營造倉庫納財物犯之當有寇賊驚恐之事明時總要曰常居嵗衝之地曹震圭曰大耗者太嵗擊衝破散之神也物擊則破衝則散破散則耗也小耗經曰小耗者嵗中虚耗之神也所理之方不宜運動出入興販經營及有造作犯之者當有遺亡虚驚之事明時總要曰常居嵗前五辰曹震圭曰小耗者小損也乃太嵗氣絶之辰故曰小耗假令寅年寅旺卯衰辰病巳死午墓未絶也與死符同位餘倣此按小耗常居大耗後一辰未至於大耗故曰小耗黃幡乾坤寳典曰黃幡者旌旗也常居三合墓辰所理之地不可開門取土嫁娶納財市買及有造作犯之者主有損亡廣聖厯曰黃幡者寅午戌嵗在戌申子辰嵗在辰亥卯未嵗在未巳酉丑嵗在丑曹震圭曰黃幡者嵗君安居之位華葢也故取三合五行墓辰墓者土也故言其黃洞源經曰將出乎中軍葢張於庫上此之謂也按寅午戌合火局火墓在戌故寅午戌嵗戌為黄幡也餘倣此豹尾豹尾者亦旌旗之象用豹尾為之葢取所向疾速之義也常居黃幡對衝其所在之方不可嫁娶納奴婢進六畜及興造犯之者破財物損小口曹震圭曰豹尾者虎賁之象先鋒之將也故常與黃幡相對是置於華葢之前也飛廉神樞經曰飛廉者嵗之廉察使君之象亦名大煞所理之方不可興工動土移徙嫁娶犯之主官府口舌疾病遺亡廣聖厯曰子年在申丑年在酉寅年在戌卯年在巳辰年在午巳年在未午年在寅未年在卯申年在辰酉年在亥戌年在子亥年在丑也曹震圭曰飛廉與大煞同義解見第四卷白虎人元秘樞經曰白虎者嵗中凶神也常居嵗後四辰所居之地犯之主有喪服之災切宜愼之曹震圭曰居三合後辰解見官符節喪門紀嵗厯曰喪門者嵗之凶神也主死喪哭泣之事常居嵗前二辰所理之地不可興舉犯之者主盜賊遺亡死喪之事蓬瀛書曰子年在寅順行十二辰曹震圭曰喪門者太嵗之轅門也故常居嵗前二辰或謂喪門與白虎對衝白虎主喪服之事衝之故凶弔客紀嵗厯曰弔客者嵗之凶神也主疾病哀泣之事常居嵗後二辰所理之地不可興造及問病尋醫弔孝送喪蓬瀛書曰子年在戌順行十二辰是也其位常與官符對衝金神洪範篇曰金神者太白之精白獸之神主兵戈喪亂水旱淫疫所理之地忌築城池建宫室豎樓閣廣園林興工上梁出軍征伐移徙嫁娶逺行赴任若犯干神者其忌尤甚堪輿經曰甲巳之年在午未申酉乙庚之年在辰巳丙辛之年在子丑寅卯午未丁壬之年在寅卯戌亥戊癸之年在申酉子丑也曹震圭曰金神者以年幹五虎元厯之逢庚辛及納音金之位者是也假如甲巳之年起丙寅順行得庚午辛未又壬申癸酉納音為劍鋒金故甲巳年午未申酉為金神也餘倣此破敗五鬼乾坤寳典曰五鬼者五行之精氣也主虚耗之事所理之方不可興舉犯之主財物耗散厯例曰甲壬年在巽乙癸年在艮丙年在坤丁年在震戊年在離巳年在坎庚年在兌辛年在乾曹震圭曰天文誌云鬼宿有五因以為名破敗者衝而散也按納甲法乾納甲壬其衝在巽故甲壬之年在巽也坤納乙癸其衝在艮故乙癸之年在艮也艮納丙其衝在坤故丙年在坤也兌納丁其衝在震故丁年在震也坎納戊其衝在離故戊年在離也離納巳其衝在坎故巳年在坎也震納庚其衝在兑故庚年在兌也巽納辛其衝在乾故辛年在乾也太嵗巳下神殺出遊日厯例曰太嵗出遊日者甲子日東遊己巳日還位丙子日南遊辛巳日還位戊子日遊中宫癸巳日還位庚子日西遊乙巳日還位壬子日北遊丁巳日還位共出遊二十五日曹震圭曰太嵗諸神者隂氣之化地祗也葢子至巳乃陽氣健旺之辰隂氣受制於陽神不敢用事故假言其出遊耳按出遊日各以五子日幹為所往之方甲為東方木故甲子日東遊丙為南方火故丙子日南遊庚為西方金故庚子日西遊壬為北方水故壬子日北遊戊為中央土故戊子日遊中宫五者生數之極故各出遊五日共五五二十五也五姓修宅宫音為土商音為金角音為木徵音為火羽音為水若嵗遇絶位為氣絶胎為白虎自墓為大墓衝墓為小墓尅嵗枝為害財嵗枝來尅者為鬼賊同類為大通相生為小通如宫姓屬土長生於申則巳年氣絶午年白虎申酉年小通辰年大墓戌年小墓丑未年大通亥子年害財寅卯年鬼賊也商姓屬金寅年氣絶卯年白虎丑年大墓未年小墓巳午年鬼賊申酉年大通辰戌亥子年小通也角姓屬木申年為氣絶鬼賊酉年為白虎鬼賊未年為大墓丑年為小墓辰戌年為害財寅卯年為大通己午亥子年為小通也徵姓屬火亥年為氣絶鬼賊子年為白虎鬼賊戌年為大墓辰年為小墓申酉年為害財寅卯丑未年為小通己午年為大通也羽姓屬水則巳年為氣絶午年為白虎丑未年為鬼賊辰年為大墓戌年為小墓寅卯申酉年為小通亥子年為大通也起月與年同宜大通小通月不宜大墓小墓月然選擇修造乆不用此存之以仍其舊男女九宫上元甲子男起七宫女起五宫中元甲子男起一宫女起二宫下元甲子男起四宫女起八宫男逆而女順男五宫則寄二宫女五宫則寄八宫今以三元九星例推之則起兌七者乃下元非上元也起坎一者乃上元非中元也起巽四者乃中元非下元也不知傳於何時今隂陽家以為合婚之用殊無理解至以中五配二八者則猶坤艮屬土之說矣御定星厯考原卷二
