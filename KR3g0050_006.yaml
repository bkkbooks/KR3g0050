body:
  text: 欽定四庫全書御定星厯考原卷六用事宜忌選擇總論吉凶之說昉於易衍於疇所以順性命之理盡變化之道而教人卜筮以為趨避之宜者也然隂陽既分剛柔定位五行順布則生尅無端干支相推則衝合互見以及納音納甲𣲖衍而枝分八卦九宫同條而共貫皆推原於易理根柢於圖書論日以繁術日以巧是不可謂理之所必無而亦勢之所必至者也三代而後隂陽家者流各出其說以鳴於世亦已紛矣况一日之間有吉神又有凶神且有一神而異名者異其名矣又有一為吉一為凶者夫神煞之名不過即五行之生旺休囚干支之刑衝合㑹以為斷耳術數之徒乃甚言其吉凶以駭衆而震俗偶有所驗羣焉信之而古之立說茫乎莫知其所由來矣今吉凶神煞既為注釋而又即用事注其宜忌以為選擇之例亦皆仍厯書之舊云上冊受封厯例曰凡登壇受冊追封諡號等事宜月德合忌四廢牢日獄日徒隸死别伏罪不舉罪刑建破平收閉日曹震圭曰正月宜辛未辛卯辛酉二月宜己丑己亥己未三月宜丁亥丁酉丁巳四月宜乙丑乙酉乙卯五月宜辛未辛丑辛亥六月宜巳巳巳卯己亥七月宜丁卯丁丑丁酉八月宜乙丑乙未乙巳九月宜辛巳辛卯辛亥十月宜己卯己酉己未十一月宜丁丑丁未丁巳十二月宜乙亥乙酉乙巳肆赦厯例曰凡赦過宥罪釋獄緩刑蠲除賦役起拔幽錮撫納流亡復還遷黜等事宜天赦天德合曹震圭曰正月宜六壬日戊寅日二月宜戊寅日三月宜六丁日戊寅日四月宜六丙日甲午日五月宜甲午日六月宜六巳日甲午日七月宜六戊日八月宜戊申日九月宜六辛日戊申日十月宜六庚日甲子日十一月宜甲子日十二月宜六乙日甲子日覃恩厯例曰凡晉遷官秩恤孤惸施恩惠宜隂德天恩天赦天德合曹震圭曰正七月酉日二八月未日三九月巳日四十月卯日五十一月亥日布政事厯例曰凡頒布制令敷揚風化等事宜天恩天馬忌四殺曹震圭曰正七月午日二八月申日四十月子日五十一月寅日行賞厯例曰凡給賜親戚賞賚勳德錫命藩屏等事宜天恩忌四殺若遇時德者止注賞賀宴樂若遇滿日注施恩行賞並忌閉日招賢舉正直厯例曰凡擇選寮宷委用謀猷舉隱逸賢能宜天馬天喜忌破平收日曹震圭曰正月午日二月申日三月午日四月子日丑日五月丑日寅日六月無七月辰日午日八月辰日申日九月戌日十月子日未日十一月寅日未日十二月無出師厯例曰凡選將訓兵出師征討等事宜天德合月德合吉期兵吉兵福兵寶寶日義日制日天馬要安止宜安撫邊境忌月虛大時大敗大殺劫殺死氣死神天獄天火兵禁五墓往亡四廢四離四絶四窮四耗四擊八專九醜月刑月害伐日專日及四殺日曹震圭曰正月宜辛未癸酉庚辰丁酉甲辰丙辰二月宜乙丑丙寅丁丑辛丑壬寅辛亥庚寅己亥申日安撫邊境三月宜甲子庚寅丙寅壬寅己亥庚子辛亥卯日安撫邊境四月宜甲子甲戌庚子庚戌酉日安撫邊境五月宜己巳辛未壬申庚辰癸巳乙未丙申甲辰乙巳戊申丙辰辰日安撫邊境六月宜丙寅巳己庚寅癸己壬寅乙巳七月宜乙丑丁卯甲戌丁丑丙戌癸卯庚戌八月宜己巳辛未壬申癸巳乙未丙申乙巳戊申亥日安撫邊境九月宜己巳壬申癸巳甲午丙申戊申乙巳午日安撫邊境十月宜庚辰甲午甲辰丙辰子日安撫邊境十一月宜乙丑丙寅乙亥丁丑庚寅己亥辛丑壬寅辛亥未日安撫邊境十二月宜甲子壬申乙亥丙申己亥庚子戊申辛亥納表上章厯例曰凡進納封章披陳利害伸理詞訟等事宜福德月空聖心解神忌反支天獄官符天吏臨日癸日建破平收滿閉日曹震圭曰正月宜壬戌日忌子午日壬午日酉日忌詞訟二月宜申日庚戌庚辰不宜未酉二日午亥二日忌詞訟三月宜子日丙寅日不宜申日卯日忌詞訟四月宜寅午戌三日不宜卯日己酉丑三日忌詞訟五月宜丑日壬寅壬辰日不宜戌日酉日忌詞訟六月宜子日庚寅庚申日不宜亥酉二日午日忌詞訟七月宜丙辰日不宜子午日卯日忌詞訟八月宜寅日甲辰甲戌日不宜卯丑日子日忌詞訟九月宜卯日壬午壬申日不宜寅日酉日忌詞訟十月宜辰日庚子日不宜卯日午未日忌詞訟十一月宜丙申丙戌日卯日忌詞訟十二月宜午日甲寅甲申日不宜卯巳二日子日忌詞訟祭祀厯例曰凡時享禘祫告成郊丘封禪嶽鎮禮享祈禱等事天寶厯曰宜神在日忌天狗遊禍寅日時祭不拘祭竈禮曰孟夏祭竈又五祀之一曰竈厯例曰凡炊爨烹飪鼓鑄陶冶祈祀等事宜孟夏月癸日黎庶但以六癸日祀之忌天狗遊禍寅日建破平收日如遇神在不忌祈福厯例曰凡建立道場開設齊醮禳除災咎請求福願等事宜天德合福生福德天巫忌天狗寅日建破平收日曹震圭曰正月宜酉日壬午壬戌壬子三月宜丁卯丁亥丁酉丁巳四月宜辰日丙午丙子丙戌五月宜亥日六月宜巳日己卯己亥七月宜子日戊辰戊午九月宜辛己辛卯辛亥辛酉十月宜未日庚午庚辰庚子庚戌十二月宜申日乙亥乙酉乙巳二八十一月無修宫室易曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯白虎通曰黃帝作宫室以避寒溫月令云孟秋之月可以修宫室當於七月擇上吉日而用之如有增修但於吉月皆可擇用修造動土豎柱上梁厯書曰凡營建宫室修飾垣牆坡池臺榭園囿橋梁戶牖欄櫪等事宜天德枝德月德天德合月德合四相生氣三合月恩玉宇金堂益後天寶天對天玉青龍天府執儲成日定日忌四廢五墓天刑朱雀白虎元武勾陳天牢建破平收日修造動土並忌土符土府地囊土王用事後豎柱上梁並忌天火大殺曹震圭曰正月子辰未戌丙午上吉乙未不宜丑日中吉丁卯辛卯次吉二月己亥丁亥戊寅未日上吉乙未不宜寅亥中吉丙戌丙申己巳丁己巳丑丁丑次吉三月子寅巳申酉亥上吉庚申辛酉不宜甲子戊子中吉丙午庚午壬午次吉四月丑未戌日上吉丙戌不宜辰午中吉甲午上吉己卯乙卯辛卯乙酉辛酉己酉次吉五月丑申戊寅上吉寅日中吉戊辰戊戌己巳辛巳辛亥次吉六月卯己申亥寅上吉癸亥不宜甲子戊子己酉中吉辛酉丙子甲午次吉七月子丑辰未戌壬午上吉辛丑癸亥不宜午日丁卯癸酉次吉八月寅未日上吉甲寅不宜丑巳日次吉癸丑癸巳亦上吉乙丑乙巳中吉九月寅申亥日上吉甲寅不宜酉巳庚午壬午丙午中吉丙子庚子壬子辛卯癸卯次吉十月丑辰未戌乙卯上吉午日中吉丙午不宜乙酉亦上吉甲子己酉己卯次吉十一月申上吉丑乙巳中吉甲戌甲辰甲寅己巳辛巳癸巳次吉十二月寅卯亥巳甲申庚辰庚申上吉丁巳不宜申日中吉乙酉亦中吉庚午甲午辛酉次吉修倉廩總要厯曰宜用天倉日忌大耗九空曹震圭曰月令云仲秋之月命有司穿竇窖修囷倉謹蓋藏務出納故宜於仲秋之月擇天恩日與營修上中吉日併者用之或餘月內選用吉日亦可如增修則不必天倉二月丁丑己丑日三月子日四孟月無五月戊戌六月己酉八月乙丑丙寅辛巳辛亥癸丑九月庚午壬午丙午十一月甲辰十二月卯日繕城郭管子曰內為城外為郭白虎通曰天子崇城言崇高也諸侯干城言不敢自專禦於天子也厯例曰凡始建宫闕築壘城郭并省臺寺監倉庫公府凡興土工宜天德枝德生氣三合益後四相要安天寶天對天符雷公執儲成日忌土府土符地囊五墓天火四殺蚩尤飛流天棒土勃隂私天獄及土王用事後曹震圭曰宜用正月子戌未丙辰上吉乙未不宜辰日中吉丁卯丁酉丙午次吉二月未日丙寅丙申丁亥上吉寅日中吉申亥丁丑次吉三月寅申丁亥丁巳上吉甲寅不宜亥巳中吉丁卯丙子壬子次吉四月丑未戌戊午上吉丙戌己丑不宜午中吉戊辰己卯辛卯己酉辛酉次吉五月寅申中吉辰日戊戌己亥己丑次吉戊辰凶六月卯巳申亥上吉癸巳不宜甲寅中吉甲子戊子次吉七月子丑辰癸未壬戌上吉辛丑不宜壬午未戌中吉癸酉次吉八月寅日癸巳上吉巳日中吉癸丑癸亥次吉九月寅午壬申丙申癸酉癸巳上吉己申酉壬午丙午中吉甲午戊午庚午癸卯次吉十月未戌乙丑甲午上吉丑午中吉甲子乙酉次吉十一月乙丑上吉丑日乙巳中吉甲戌甲辰次吉十二月亥巳甲寅庚寅甲申庚申乙卯上吉寅卯申中吉甲午庚午乙酉次吉忌用正月丑寅日庚子庚午日二月卯巳日癸未癸丑日三月辰酉日甲寅甲子日四月寅巳日己卯己丑日五月午日戊辰日六月戌未日癸巳日七月卯申日丙寅日八月未酉日丁卯丁巳日九月戌亥日戊辰戊子日十月辰亥日庚戌庚子日十一月申子日辛未辛酉日十二月子丑日乙未乙酉日爐冶厯例曰凡置爐治與修造動土同若鎔鑄器物忌九焦開渠厯例曰凡穿浚溝渠池沼泉源等事宜生氣開日開渠忌壬日并忌土符土府地囊閉日建破平收日土王用事後曹震圭曰通溝于三月中氣後擇上吉日用穿井厯例曰宜用生氣日開日忌土符土府地囊閉日建破平收日及土王用事後并忌卯日修碓磑天寶厯曰春不修磑謂陽初也夏不修磑謂陽衰而隂微也各月擇吉日用之宜定日成日開日忌土符土府地囊五墓建破平收日土王用事後拜官厯例曰凡襲封官爵等事同宜時德天喜驛馬王日官日相日民日守日建日忌官符徒隸死别伏罪不舉罪刑四廢牢日獄日破日平日收日滿日閉日曹震圭曰宜正月卯酉寅日二月卯日三月寅酉巳日四月子巳午日五月午日六月己申子日七月申酉卯日八月酉日九月申亥卯日十月子午亥日十一月子日十二月亥寅午日忌正月子丑辰未戌亥日二月子丑辰未申戌亥日三月子丑未申戌亥日四月寅卯辰未戌日五月卯辰未戌亥日六月寅卯辰戌亥日七月丑巳午未戌日八月丑寅己午未戌日九月丑寅己午未戌日十月丑辰酉申戌日十一月丑辰己申酉戌日十二月辰己申酉戌日又凡速用不能待吉日者於忌日之外選而用之上官赴任厯例曰凡奉承恩命臨赴治任等事同宜驛馬月德月恩王日官日相日民日守日忌天獄天吏往亡四絶四離建破平收滿閉日曹震圭曰宜正月卯午日丙戌丙午日二月甲戌丁丑甲申丁亥甲辰丁未三月寅酉日庚子壬子日四月庚午己卯己丑庚戌五月丙寅戊辰戊寅丙戌戊戌六月子申日辛亥甲寅日七月子日壬午壬辰日八月庚辰癸未庚寅庚戌癸丑九月申亥卯日丙寅庚午庚寅丙申丙午庚申日十月子日乙酉甲辰十一月壬申甲申壬辰甲辰十二月寅午亥日庚申日忌正月子日三月申日四月亥日六月卯日七月午日九月辰日子酉日十月未日十一月戌日十二月丑酉日二五八月無臨政親民厯例曰凡禮上參賀頒布條令受覽圖籍聽決獄訟等事宜王日官日相日民日守日臨官視事宜六儀忌蚩尤飛流天棒隂私土勃天獄天吏臨日官符建破平收滿閉日牢日獄日徒隸死别伏罪不舉罪刑破屋壞垣厯例曰凡毁拆屋舍平覆垣墉等事宜破日忌成日平治道塗凡平理地勢道路途徑等事宜平日補垣塞穴凡填覆坑穽補葺垣墉基址宜滿閉日忌九坎開日伐木厯例曰凡採取材木等事宜立冬後立春前午日申日危日忌建破平收日曹震圭曰月令云孟夏之月毋伐樹木草木零落然後斤斧入山故立冬後立春前擇午申日用之按午火也申金也金能尅木木受其傷木能生火木泄其氣故以用之移徙厯例曰凡移徙居處等事宜驛馬月恩四相忌歸忌九醜建破平收日月厭日掃舍宇凡掃除宫室宅舍等事宜季月除日忌日逰神所在之方安牀安置産室附厯例曰凡安置産室豎立幈帳張懸帷幄等事宜危日忌申日及日遊神所在之方安