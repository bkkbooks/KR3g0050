body:
  text: 欽定四庫全書御定星厯考原卷一象數本要天地易曰立天之道曰隂與陽立地之道曰柔與剛聖人紀隂陽之正協剛柔之宜治厯明時以調天地之化欽若授時在齊七政其來尚矣然有天地之形焉有天地之運焉以形言之書傳引渾天之說曰天之形如鳥卵地居其中天包地外如卵之裹黃圓如彈丸故曰渾天言其形渾渾如也朱子曰天包地外地處天中故天之形半覆地上半繞地下而左旋不息其樞紐不動之處為南北極今按周天三百六十度分為十二宫地周亦三百六十度而在天一度者在地二百里以定北極岀地之髙下日岀入之後先節氣時刻之早晚則天誠渾圓地亦渾圓也以運言之蔡氏書傳曰天體至圓周圍三百六十五度四分度之一繞地左旋一日一週而過一度日麗天而少遲故日行一日亦繞地一週而不及天一度月麗天而尤遲一日不及天十三度十九分度之七朱子曰厯家算所退之度却云日行一度月行十三度有竒此乃截法故有日月五星右行之說史伯璿曰天非有體也二十八宿與衆經星即其體也二十八宿與衆經星繞地左旋一晝一夜而一週日月亦與之同運但不及其健則漸退而反似右耳今按天分九重第一重為月天第二重為水星亦曰辰星第三重為金星亦曰太白第四重為日天第五重為火星亦曰熒惑第六重為木星亦曰嵗星第七重為土星亦曰鎮星第八重為三垣二十八宿謂之恆星亦謂之經星第九重為宗動天宗動左旋日月星右轉高則愈遲低則愈疾故月一月而一週天金水與日皆一嵗而一週天火二嵗而一週天木十二嵗而一週天土二十八嵗而一週天經星每年東行五十一秒是為嵗差以為推算之術今七政厯以土木火金水為次以高卑遲疾為次者也若皆以左旋論之則遲者為疾疾者為遲日月星之一週天者皆不及天之一週耳總之天動也地静也日月星辰麗乎天隨天而動故經緯錯綜而成章也不然天一日而一週日月星辰亦隨天而不動則皆一定之物而一嵗如斯者終古亦如斯又安有所謂厯者哉五紀洪範曰四五紀一曰嵗二曰月三曰日四曰星辰五曰厯數嵗者日與天㑹也日一日行一度三百六十五日有竒而匝天一週復與天㑹是為一嵗而春夏秋冬統於其間矣月者日與月㑹也日一日行一度月一日行十三度有奇二十七日有奇而匝天一週又二日有奇而與日㑹是為一月而晦朔弦望統於其間矣日岀地而為晝入地而為夜以右行論之則為東行一度若以左旋論之特不及天之一度耳亦一週也故合晝夜以為日而曉午昬暮統於其間矣星者森列之名辰者躔次之舍垣宿則附天而行五星則遲速不一天分十二辰辰有三十度迭運循環週而復始是故一寒一暑以為嵗一盈一缺以為月一明一昧以為日一經一緯以為星嵗月日星紀於辰合嵗月日星辰而為厯數以調四時之氣以正晦朔之期以定晨昬之節推步以稽其運行觀候以窺其躔舍所以成嵗功而齊七政者莫大於此故以厯數終焉八卦乾南坤北離東坎西震東北兌東南巽西南艮西北是謂先天八卦離南坎北震東兌西乾坤艮巽位以四維是謂後天八卦自漢以來但知有後天而已至焦延壽京房輩納甲卦氣之學則又自為一家與先後天各不相溷也卦氣起於中孚有十二辟公侯卿大夫之號古今厯家注厯皆用之及宋邵子乃得先天之學以傳其說則以復姤為二至臨遯為二分左右順逆岀於畫卦自然之序與漢儒卦氣迥然兩說今人因朱子本義用十二辟卦遂誤以為邵子之說則非也五行六經論五行者始見於禹其作洪範也一五行一曰水二曰火三曰木四曰金五曰土其告帝也曰水火金木土穀惟修其作貢也曰六府孔修皆言五行也說者謂其源皆起於河圖洛書之數葢圖書之一六水也二七火也三八木也四九金也五十土也在圖則左旋而相生在書則右轉而相克也然土於圖書為五十中宫之數本無定位無專體者也惟吕氏月令則以土直季夏之月以順相生之序漢人之學又以土直辰戌丑未之四季而分旺於四時要之其說皆不可廢攷文王後天圖象坤艮二土獨居夏秋冬春之交葢火必得土而後能成金水必得土而後能生木則土雖寄旺於四時五行之間而於此二處則其用為尤切張子朱子亦言水火非土所能制惟木金為土之所生也其義精矣甲厯通鑑綱目前編曰天皇氏始制干支之名以定嵗之所在爾雅曰太嵗在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰强圉在戊曰著雍在已曰屠維在庚曰上章在辛曰重光在壬曰元黓在癸曰昭陽是為嵗陽在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戌曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若是為嵗名葢支以配地故有定方干以象天故無定所支干相配六甲而天道一週是為甲厯然則干支者其厯之所由起乎十干蔡邕獨斷云干幹也其名有十甲乙丙丁戊己庚辛壬癸是也禮記月令春月其日甲乙夏月其日丙丁中央土其日戊己秋月其日庚辛冬月其日壬癸鄭註曰乙之言軋也日之行春發生萬物月為之佐時萬物皆解孚甲自抽軋而岀因以為日名焉乙不為月者君統臣功也丙之言炳也日之行夏長育萬物月為之佐時萬物炳然著見而强大又因以為日名焉戊之言茂也已之言起也日之行四時之間萬物至此皆枝葉茂盛其含秀者抑屈而起故因以為日名焉庚之言更也辛之言新也日之行秋成熟萬物月為之佐萬物皆肅然改更秀實新成又因以為日名焉壬之言任也癸之言揆也日之行冬閉藏萬物月為之佐時萬物懷任於下揆然萌芽又因以為日名焉孔疏曰律厯誌云岀甲於甲則甲是孚甲也又云奮軋於乙則乙軋也又云明炳於丙則丙炳也又云大成於丁則丁成也又云豐茂於戊則戊茂也又云理紀於已則已理也謂理正紀綱也又云改更於庚則庚更也謂物改更也又云悉新於辛則辛新也又云懷任於壬則壬任也又云陳揆於癸則癸揆也謂物之陳列可揆度也曹震圭曰甲乙配東方木也丙丁配南方火也戊己配中央土也庚辛配西方金也壬癸配北方水也按十干配五行則五行各二十干分隂陽則隂陽各半故甲陽木乙隂木也丙陽火丁隂火也戊陽土己隂土也庚陽金辛隂金也壬陽水癸隂水也如鄭註所謂月為之佐者是也周子曰陽變隂合而生水火木金土又曰五行一隂陽也其是謂歟十二支蔡邕獨斷曰支枝也其名一十有二子丑寅卯辰巳午未申酉戌亥是也曹震圭曰子寅辰午申戌為六陽辰以配乾也丑卯己未酉亥為六隂辰以配坤也按陽生於子於律為黄鐘是為天統以次寅為太蔟辰為姑洗午為㽔賓申為夷則戌為無射皆以陽律配之故屬陽隂生於未於律為林鐘是為地統以次酉為南吕亥為應鐘丑為大吕卯為夾鐘已為仲吕皆以隂吕配之故屬隂漢書律厯誌云孶萌於子則子者孶也紐牙於丑則丑者紐也引達於寅則寅者引也冒茆於卯則卯者茆也謂叢生也振美於辰則辰者振也已盛於已則已謂陽氣已岀而盛也咢布於午則午者布也昧薆於未則未者昧也申堅於申則申者堅也畱孰於酉則酉者畱也畢入於戌則戌者入也該閡於亥則亥者該也以四時言之則寅卯辰為春巳午未為夏申酉戌為秋亥子丑為冬以五行言之則寅卯東方木巳午南方火申酉西方金亥子北方水辰戌丑未四維土十二月辟卦月建月將附正月建寅泰卦月令孟春鄭註曰孟春者日月會於娵訾而斗建寅之辰也正月三陽之月泰三陽之卦故以配之二月建卯大壯卦月令仲春鄭註曰仲春者日月會於降婁而斗建卯之辰也二月四陽之月大壯四陽之卦故以配之三月建辰夬卦月令季春鄭註曰季春者日月會於大梁而斗建辰之辰也三月五陽之月夬五陽之卦故以配之四月建已乾卦月令孟夏鄭註曰孟夏者日月會於實沈而斗建巳之辰也四月純陽之月乾純陽之卦故以配之五月建午姤卦月令仲夏鄭註曰仲夏者日月會於鶉首而斗建午之辰也夏至一隂始生姤一隂之卦故以配之六月建未遯卦月令季夏鄭註曰季夏者日月會於鶉火而斗建未之辰也六月二隂之月遯二隂之卦故以配之七月建申否卦月令孟秋鄭註曰孟秋者日月會於鶉尾而斗建申之辰也七月三隂之月否三隂之卦故以配之八月建酉觀卦月令仲秋鄭註曰仲秋者日月會於壽星而斗建酉之辰也八月四隂之月觀四隂之卦故以配之九月建戌剝卦月令季秋鄭註曰季秋者日月會於大火而斗建戌之辰也九月五隂之月剝五隂之卦故以配之十月建亥坤卦月令孟冬鄭註曰孟冬者日月會於析木而斗建亥之辰也十月純隂之月坤純隂之卦故以配之十一月建子復卦月令仲冬鄭註曰仲冬者日月會於星紀而斗建子之辰也冬至一陽始生復一陽之卦故以配之十二月建丑臨卦月令季冬鄭註曰季冬者日月會於元枵而斗建丑之辰也十二月二陽之月臨二陽之卦故以配之按史記曰用昏建者杓夜半建者衡平旦建者魁春秋運斗樞云第一天樞第二璇第三璣第四權第五衡第六開陽第七搖光第一至第四為魁第五至第七為杓合而為斗如正月初昏則用斗杓指寅夜半則用斗衡指寅平旦則用斗魁指寅也其日月所會之宫謂之月將娵訾亥也降婁戌也大梁酉也實沈申也鶉首未也鶉火午也鶉尾巳也壽星辰也大火卯也析木寅也星紀丑也元枵子也子曰神后丑曰大吉寅曰功曹卯曰太衝辰曰天罡巳曰太乙午曰勝光未曰小吉申曰傳送酉曰從魁戌曰河魁亥曰登明月建運天道而左旋為天關月將稟地道而右轉為地軸二十四方位四正四隅分配八卦是為八方然正隅之間相距尚逺又以十二支象地皆有定方然十二不能均分於八方惟子午卯酉又正應四正之位故以子代坎以午代離以卯代震以酉代兌餘則夾處於四隅又以十干分五行惟戊己配中央餘則夾處於四正合卦四地支十二天干八共二十四每方各三戌乾亥也壬子癸也丑艮寅也甲卯乙也辰巽巳也丙午丁也未坤申也庚酉辛也分配八卦二十四方位由是而定焉二十四氣應二十四方位立春艮雨水寅驚蟄甲春分卯清明乙榖雨辰立夏巽小滿巳芒種丙夏至午小暑丁大暑未立秋坤處暑申白露庚秋分酉寒露辛霜降戌立冬乾小雪亥大雪壬冬至子小寒癸大寒丑四立二分二至正應八卦是為八節日岀入晝夜時刻日行黃道岀入於赤道之内外春秋分則正當黃赤道之交而與地平交於卯酉日岀卯正日入酉正地平上下其度相等故晝夜適均所謂日中宵中也春分以後行赤道北夏至而極北天度分界地平上多下少故晝長夜短所謂日永也秋分以後行赤道南冬至而極南天度分界地平上少下多故晝短夜長所謂日短也二分前後日行二道之交其緯行疾故數日而差一刻二至前後日行二弧之背其緯行遲故半月而差一刻此一嵗之大略也自京而北夏晝較長冬晝較短為近北也若至於北極下則赤道為地平夏則有晝而無夜冬則有夜而無晝此北之極也自京而南夏晝較短冬晝較長為近南也赤道之下則赤道為天頂冬至在南夏至在北相去適均則冬夏相等赤道以南則北極入地下南極岀地上冬至日去天頂近晝反長夏至日去天頂逺晝反短若至於南極下則赤道又為地平冬則有晝而無夜夏則有夜而無晝此南之極也南北不同時刻亦異故各省日岀入晝夜時刻皆以地之緯度而定焉節氣時刻一嵗之内日一週天厯十有二宫其交每宫十五度者為節其交每宫初度者為氣然七政之行起於子正有今日子正尚未交而明日子正已過者則以三率之術求之而知其為某時刻也但地之經度不同故京師為午正者自東方視之則已過矣自西方視之則猶未及也是以在東者交節晚在西者交節早東西不同時刻亦異故各省節氣時刻皆以地之經度而定焉晨昏朦景日體光大未岀之前已入之後距地平十八度以内皆有光是為朦景然以算術推之則十八度一也而各時各處時刻不同各時不同者天度使然也葢赤道當天之腰其度闊自赤道而南北漸逺則漸狹故近二分者朦景為時少近二至者朦景為時多也各處不同者地勢使然也近赤道則日行直直則徑近二極則日行斜斜則紆故愈北則朦景為時愈多愈南則朦景為時愈少也然地體渾圓人之所處如在球面四邊卑而中髙故日出入於正東西者其朦景短春秋分日岀卯入酉晨昏朦景各六刻五分然其在地平下十八度猶斜向北也惟日道在地平下九度與卯酉圏相交者則在地平居卯酉圏之南在地平下十八度居卯酉圏之北皆正當球面之最高故京師朦景最短之日一在驚蟄一在寒露晨昏各六刻四分其術則半徑與赤道距天頂正弦之比同於九度正弦與距緯正弦之比也冬至日岀入偏南其地面卑故晨昏朦景各六刻十三分是為較長然其在地平下十八度則猶斜向正東西也既斜向正東西則猶當地平之高處故雖長於春秋分而猶不甚長也若夏至則岀入皆已偏北其在地平下十八度益斜向北故晨昏朦景各八刻八分是為最長若地愈北極愈高日行愈斜則夏且有晝而無夜更不特長而已赤道之下則赤道即卯酉圏日行直而度闊故二分之日朦景最短止四刻十二分赤道以南與是相反此天度地勢之分兼以地球南北之異所以朦景之時刻有隨時隨地之不同也五行用事神樞經曰五行旺各有時惟土居無所定乃於四立之前各旺一十八日厯例曰立春木立夏火立秋金立冬水各旺七十二日土於四立之前各旺一十八日合之亦為七十二日總三百有六十而嵗成矣七十二候汲冢周書曰立春之日東風解凍又五日蟄蟲始振又五日魚上冰今作魚陟負冰雨水之日獺祭魚又五日鴻雁來今作候雁北又五日草木萌動驚蟄之日桃始華又五日倉庚鳴又五日鷹化為鳩春分之日元鳥至又五日雷乃發聲又五日始電清明之日桐始華又五日田鼠化為鴽又五日虹始見穀雨之日萍始生又五日鳴鳩拂其羽又五日戴勝降于桑立夏之日螻蟈鳴又五日蚯蚓岀又五日王瓜生小滿之日苦菜秀又五日靡草死又五日小暑至今作麥秋至芒種之日螳螂生又五日鵙始鳴又五日反舌無聲夏至之日鹿角解又五日蜩始鳴又五日半夏生小暑之日溫風至又五日蟋蟀居壁又五日鷹乃學習今作鷹始摯大暑之日腐草為螢又五日土潤溽暑又五日大雨時行立秋之日凉風至又五日白露降又五日寒蟬鳴處暑之日鷹乃祭鳥又五日天地始肅又五日禾乃登白露之日鴻雁來又五日元鳥歸又五日羣鳥養羞秋分之日雷始收聲又五日蟄蟲坏戸又五日水始涸寒露之日鴻雁來賓又五日爵入大水為蛤爵今作雀又五日菊有黃華霜降之日豺乃祭獸又五日草木黃落又五日蟄蟲咸俯立冬之日水始冰又五日地始凍又五日雉入大水為蜃小雪之日虹藏不見又五日天氣上騰騰今作升地氣下降又五日閉塞而成冬大雪之日鶚鳥不鳴鶚鳥今作鶡鴠又五日虎始交又五日茘挺生生今作岀冬至之日蚯蚓結又五日麋角解又五日水泉動小寒之日雁北向向今作鄉又五日鵲始巢又五日雉始雊今無始字大寒之日鷄始乳今無始字又五日鷙鳥厲疾鷙今作征又五日水澤腹堅是則五日一候一月六候一嵗七十二候所以驗天地之氣觀鳥獸草木之時即堯典分命申命之意也然日行有盈縮故第三候至第四候第六候至次月第一候或四日或六日者有之至于註釋則月令言之詳矣閏月左傳曰先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中人則不惑歸餘於終事則不悖蔡氏書傳曰嵗有十二月月有三十日三百六十者一嵗之常數也故日與天會而多五日九百四十分日之二百三十五為氣盈月與日會而少五日九百四十分日之五百九十二為朔虚合氣盈朔虚而閏生焉故一嵗閏率則十日九百四十分日之八百二十七三嵗一閏則三十二日九百四十分日之六百單一五嵗再閏則五十四日九百四十分日之三百七十五十有九嵗七閏則氣朔分齊是為一章也漢志曰至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀嵗朔又復謂之元是故日以實之月以閏之時以分之嵗以周之章以明之蔀以部之紀以記之元以原之元法四千五百六十紀法千五百二十蔀法七十六章法十九故十九年為一章四章為一蔀二十蔀為一紀三紀為一元汲冢周書曰中氣以著時應閏無中氣斗柄指兩辰之間故閏前之月中氣在晦閏後之月中氣在朔當閏之月節居月中以前作前月用事以後作後月用事所以定四時成嵗者不越乎此矣五行生旺木長生於亥火長生於寅金長生於已水長生於申土則亦長生於申寄生於寅葢坤艮之位也各由長生沐浴冠帶臨官帝旺衰病死墓絶胎養順厯十二辰按天道循環生生不已故木方旺而火已生火方旺而金已生金方旺而水已生水方旺而木已生由長生而順推穉則必壯盛則必衰終而復始迭運不窮此四時之所以錯行五氣之所以順布也至於土則旺於辰戌丑未為四庫葢水火木金皆藏於土而位乎中央故易於坤曰萬物皆致養焉於艮曰萬物之所成終而所成始也可與此互相發矣干支五行天干則甲乙屬木丙丁屬火戊己屬土庚辛屬金壬癸屬水地支則寅卯辰屬水配東方也巳午未屬火配南方也申酉戌屬金配西方也亥子丑屬水配北方也而土寄旺於辰戌丑未之間配四季也此古今說者之所同然星命家又以寅亥屬木卯戌屬火辰酉屬金子丑屬土而午則為日未則為月其說不同何也葢星命家以十二宫排定上下四方子丑在下故為土午未在上故為日為月寅卯辰巳申酉戌亥分布左右則如四時之流行於天地之間故以其左右之合宫而别為木火金水之序也至於納音之五行則有以六十日之隔八相生推配為說者又有以干支起數相配及分納五音者詳具後篇納音通鑑綱目前編曰黃帝命大撓探五行之精占斗柄所建始作甲子支干相配以名而定之以納音然從來言五行者以氣始形終為次則洪範之水火木金土是也以播於四時相生為次則月令之木火土金水是也以飭庀五材相尅為次則禹謨之水火金木土是也納音五行始金次火次木次水次土既非本其始終又無取於生尅故說者莫知其所自來今按諸術源流無非祖述易象之意納音之法葢亦兼先後天之理而用之者也各為之圖以明之納音五行應先天圖先天之圖乾兌居首屬金次以離屬火又次震巽屬木又次以坎屬水終於艮坤屬土故始於金終於土者乾始坤成之義也金取於天之剛土取於地之柔火附於天水附於地而木以生氣居中此納音所本於先天之序也納音五行應後天圖後天之圖亦以乾居首而逆轉自乾兌之金旺於西方次轉而為離火旺於南方次又轉而為震巽之木旺於東方次又轉而為坎水旺於北方而土旺於四季故退艮坤以居終焉此納音所本於後天之序也納音五行甲子乙丑金丙寅丁卯火戊辰己巳木庚午辛未土壬申癸酉金甲戌乙亥火丙子丁丑水戊寅己卯土庚辰辛巳金壬午癸未木甲申乙酉水丙戌丁亥土戊子己丑火庚寅辛卯木壬辰癸巳水甲午乙未金丙申丁酉火戊戌己亥木庚子辛丑土壬寅癸卯金甲辰乙巳火丙午丁未水戊申己酉土庚戌辛亥金壬子癸丑木甲寅乙卯水丙辰丁巳土戊午己未火庚申辛酉木壬戌癸亥水按舊有海中金爐中火之類於義無取玆不載納音五行分三元應樂律隔八相生圖右圖以甲子乙丑為金上元壬申癸酉為金中元庚辰辛巳為金下元三元既周則傳於戊子己丑為火上元丙申丁酉為火中元甲辰乙巳為火下元自此以後皆依前圖金火木水土之次而用樂律同位娶妻隔八生子之法以終於丁巳而納音小成矣又自甲午乙未為金上元起如前法以終於丁亥而納音大成矣按十干十二支相錯為六十五音十二律相乘亦為六十故納音之法兼二者而用之甲子金而乙丑亦為金者同位娶妻也乙丑金而壬申又為金者隔八生子也一行各三元而後傳於次行猶春有孟仲季三月而後傳於夏也自甲子至丁巳而五行之三元一周猶易之三畫為小成也自甲午至丁亥而五行之三元又一周猶易之六畫為大成也其立法皆與律吕相應納音干支起數合五行甲己子午九乙庚丑未八丙辛寅申七丁壬卯酉六戊癸辰戌五己亥屬四數此揚子雲太元論聲律所紀數也凡兩干兩支之合其餘數得四九者為金得一六者為火得三八者為木得五十者為水得二七者為土如甲子皆九得數十八乙丑皆八得數十六合之三十有四故為金壬六申七得數十三癸五酉六得數十一合之二十有四故亦為金也其餘按圖推之莫不皆然但所配一六二七等數與河圖之數不同今按大衍之數五十其用四十有九以兩干兩支之合數於四十九内減之餘數又滿十去之餘一六為水二七為火三八為木四九為金五十為土各取所生之五行以為納音如是則與河圖相同又揲蓍之法用餘策以定竒偶此用餘數以定五行其理正相合也如甲九子九乙八丑八其合數三十四於四十九内減之餘十五逢十不用餘五屬土土生金故曰金如丙寅丁卯共合數二十六四十九内減之餘二十三十不用餘三屬木木生火故曰火如戊辰己巳共合數二十三四十九内減之餘二十六十不用餘六屬水水生木故曰木如庚午辛未共合數三十二四十九内減之餘十七十不用餘七屬火火生土故曰土如壬申癸酉共合數二十四四十九内減之餘二十五十不用餘五屬土土生金故曰金如甲戌乙亥共合數二十六四十九内減之餘二十三十不用餘三屬木木生火故曰火如丙子丁丑共合數三十四十九内減之餘十九十不用餘九屬金金生水故曰水如戊寅己卯共合數二十七四十九内減之餘二十二十不用餘二屬火火生土故曰土如庚辰辛巳共合數二十四四十九内減之餘二十五十不用餘五屬土土生金故曰金如壬午癸未共合數二十八四十九内減之餘二十一十不用餘一屬水水生木故曰木如甲申乙酉共合數三十四十九内減之餘十九十不用餘九屬金金生水故曰水如丙戌丁亥共合數二十二四十九内減之餘二十七十不用餘七屬火火生土故曰土如戊子己丑共合數三十一四十九内減之餘十八十不用餘八屬木木生火故曰火如庚寅辛卯共合數二十八四十九内減之餘二十一十不用餘一屬水水生木故曰木如壬辰癸巳共合數二十四十九内減之餘二十九十不用餘九屬金金生水故曰水又如甲午乙未共合數三十四四十九内減之餘十五十不用餘五屬土土生金故曰金如丙申丁酉共合數三十六四十九内減之餘十三十不用餘三屬木木生火故曰火如戊戌己亥共合數二十三四十九内減之餘二十六十不用餘六屬水水生木故曰木如庚子辛丑共合數三十二四十九内減之餘十七十不用餘七屬火火生土故曰土如壬寅癸卯共合數二十四四十九内減之餘二十五十不用餘五屬土土生金故曰金如甲辰乙巳共合數二十六四十九内減之餘二十三十不用餘三屬木木生火故曰火如丙午丁未共合數三十四十九内減之餘十九十不用餘九屬金金生水故曰水如戊申己酉共合數二十七四十九内減之餘二十二十不用餘二屬火火生土故曰土如庚戌辛亥共合數二十四四十九内減之餘二十五十不用餘五屬土土生金故曰金如壬子癸丑共合數二十八四十九内減之餘二十一十不用餘一屬水水生木故曰木如甲寅乙卯共合數三十四十九内減之餘十九十不用餘九屬金金生水故曰水如丙辰丁巳共合數二十二四十九内減之餘二十七十不用餘七屬火火生土故曰土如戊午己未共合數三十一四十九内減之餘十八十不用餘八屬木木生火故曰火如庚申辛酉共合數二十八四十九内減之餘二十一十不用餘一屬水水生木故曰木如壬戌癸亥共合數二十四十九内減之餘二十九十不用餘九屬金金生水故曰水又納音五行分屬五音圖朱子曰樂聲是土金木火水洪範是水火木金土即此義可以推納音之法矣天干之十地支之十二各屬於五行而干支錯綜之則成花甲之六十故有納音之五行以合干支之生化焉葢納音者以干支分配於五音而本音所生之五行即為其干支所納之音也宫商角徴羽之五音初以甲丙戊庚壬五陽干納之而係之以五子宫聲之下得甲子而乙丑隨之商聲之下得丙子而丁丑隨之角聲之下得戊子而己丑隨之徵聲之下得庚子而辛丑隨之羽聲之下得壬子而癸丑隨之五子干支皆陽五丑干支俱隂以隂從陽體乾健坤順之義也宫聲為土土之所生為金故甲子乙丑納音金商聲為金金之所生為水故丙子丁丑納音水角聲為木木之所生為火故戊子己丑納音火徵聲為火火之所生為土故庚子辛丑納音土羽聲為水水之所生為木故壬子癸丑納音木此初甲十干支所納之音也次以甲丙戊庚壬五陽干係之以五寅葢陽支之首為子其次則寅五音之首為宫其次則商子係之天干之首為甲子得宫則寅係之天干之首而次得商故甲寅得商而乙卯隨之納音為水丙寅得角而丁卯隨之納音為火戊寅得徵而己卯隨之納音為土庚寅得羽而辛卯隨之納音為木壬寅得宫而癸卯隨之納音為金此二甲十干支所納之音也如自壬子癸丑而序之壬子癸丑得羽聲羽為五音之終終而復始則次羽為宫繼壬子癸丑則為壬寅癸卯故壬寅癸卯得宫聲而納音金焉此五行以次相旋生生不已者也次三以甲丙戊庚壬五陽干係之以五辰葢陽支之二為寅其三則辰五音之二為商其三則角寅係之天干之首為甲寅得商則辰係之天干之首為甲辰必得角故甲辰得角而乙巳隨之納音為火丙辰得徵而丁巳隨之納音為土戊辰得羽而己巳隨之納音為木庚辰得宫而辛巳隨之納音為金壬辰得商而癸巳隨之納音為水此三甲十干支所納之音也次四以甲丙戊庚壬五陽干係之以五午若依次順列甲辰既得角則甲午宜得徵午之次為申申之次為戌則甲申宜得羽而甲戌又復得宫如此序之則五音之中惟宫得二甲其餘皆得一甲於循環終始之義不協矣况天干同而地支相對者為隂陽二氣之分以六十花甲分配五音則天干猶為要領葢因十干隂陽皆五正以分布五音之序也故陽生於子自甲子而終於癸巳隂生於午自甲午而終於癸亥爰以甲午與甲子並列於宫而乙未隨之納音為金丙午與丙子並列於商而丁未隨之納音為水戊午與戊子並列於角而己未隨之納音為火庚午與庚子並列於徵而辛丑隨之納音為土壬午與壬子並列於羽而癸未隨之納音為木此四甲十干支所納之音也次五以甲丙戊庚壬五陽干係之以五申葢陽支午之次為申甲午既得宫則甲申得商而乙酉隨之納音為水丙申得角而丁酉隨之納音為火戊申得徵而己酉隨之納音為土庚申得羽而辛酉隨之納音為木壬申復得宫而癸酉隨之納音為金此五甲十干支所納之音也次六以甲丙戊庚壬五陽干係之以五戌葢陽支申之次為戌甲申既得商則甲戌得角而乙亥隨之納音為火丙戌得徵而丁亥隨之納音為土戊戌得羽而己亥隨之納音為木庚戌復得宫而辛亥隨之納音為金壬戌得商而癸亥隨之納音為水此六甲十干支所納之音也要之干應乎天支應乎地花甲應乎人自納音之位定而三才遂各有專屬之五行矣宫屬土生金甲子乙丑甲午乙未壬申癸酉壬寅癸卯庚辰辛巳庚戌辛亥商屬金生水丙子丁丑丙午丁未甲申乙酉甲寅乙卯壬辰癸巳壬戌癸亥角屬木生火戊子己丑戊午己未丙申丁酉丙寅丁卯甲辰乙巳甲戌乙亥徵屬火生土庚子辛丑庚午辛未戊申己酉戊寅己卯丙辰丁巳丙戌丁亥羽屬水生木壬子癸丑壬午癸未庚申辛酉庚寅辛卯戊辰己巳戊戌己亥納甲直圖乾坤艮兌坎離震巽乾坤甲乙丙丁戊己庚辛壬癸乾納甲壬坤納乙癸乾坤包括始終之義也其餘六卦則自下而上法畫卦者之自下而上也震巽隂陽起於下故震納庚巽納辛坎離隂陽交於中故坎納戊離納己艮兌隂陽極於上故艮納丙兌納丁甲丙戊庚壬為陽干皆納陽卦乙丁己辛癸為隂干皆納隂卦圓圖此以六卦應月候而坎離為日月之本體居中不用震直生明者一陽始生又生明之時以初昏候之月見庚方也兌直上弦者二陽浸盛又上弦之時以初昏候之月見丁方也乾直望者三陽盛滿又望時以初昏候之月見甲方也巽直生魄則一隂始生又生魄之時以平明候之月見辛方也艮直下弦則二隂浸盛又下弦之時以平明候之月見丙方也坤直晦則三隂盛滿又晦時以平明候之月見乙方也皆與納甲相應納甲納十二支圖此以八卦之六畫分納六辰之法也凡乾在内卦則為甲而納子寅辰如初九為甲子九二為甲寅九三為甲辰也在外卦則為壬而納午申戌如九四為壬午九五為壬申上九為壬戌也凡坤在内卦則為乙而納未巳卯如初六為乙未六二為乙巳六三為乙卯也在外卦則為癸而納丑亥酉如六四為癸丑六五為癸亥上六為癸酉也因乾坤各納兩干故别為内外二卦若震止納庚則初九為庚子六二為庚寅六三為庚辰九四為庚午六五為庚申上六為庚戌巽止納辛則初六為辛丑九二為辛亥九三為辛酉六四為辛未九五為辛巳上九為辛卯坎離艮兌四卦依震巽例推之按納甲之法不知其所自起因其以六卦直月候明魄死生隂陽消息與先天圖有相似者故道書參同契中所陳本述納甲之說而朱子以為即先天之傳也孔子之後諸儒失之而方外之流密相付授以為丹竈之術耳今按先天之圖八卦俱備而納甲除去坎離以為二用則其法亦不盡合或曰說卦言天地定位山澤通氣雷風相薄乃以三陽三隂至一陽一隂為序而其後方言水火不相射葢以六卦寓消息而以水火為用或者古有此說也至其參錯六辰之法則陽皆順行隂皆逆轉隂陽之老長中少每差一位惟震與乾同者長子繼父體也坤不起於丑而起於未尤與洛書耦數起未位後天圖坤居西南樂律林鐘為地統而應未月之氣者相合故諸術之中惟納甲為近理今火珠林卜卦即其法也十二辰二十八宿星象十二辰禽象子鼠丑牛寅虎卯辰龍巳蛇午馬未羊申猴酉鷄戌狗亥猪其說相沿已乆莫知其所自來雖於經典無見然以傳記子史考之則不獨宋以後也如韓愈毛穎傳謂食於卯地祭張員外文謂虎取而去來寅其徵則唐時有之矣管輅傳推東方朔龍蛇之占以為變化相推會於辰巳又譙周謂司馬為典午則漢晉時有之矣遡而上之晉師三豕渡河而孔子以為己亥葢干支相配乙亥為一豕丁亥為二豕至己亥則三豕也陳敬仲筮者言當昌於姜姓之國而釋春秋者謂觀之六四納得辛未辛為巽為長女未為羊羊加女為姜則是周時又已有之也至於二十八宿禽象則近代方有之意者因十二辰所取而附會其説耳何則十二辰以子午卯酉為四中宫故一宫各筦三象子宫女虚危虚星居中故為鼠之本象女為蝠危為燕則取其似鼠者以配之也卯宫氐房心房星居中故為之本象氐為貉心為狐則取其似者以配之也午宫柳星張星居中故為馬之本象柳為獐張為鹿則取其似馬者以配之也酉宫胃昴畢昴星居中故為鷄之本象胃為雉畢為烏則取其似鷄者以配之也其餘寅申巳亥辰戌丑未八宫則各筦兩象而以近中宫者為主辰宫亢近中宫故為龍之本象角居其旁則取蛟為龍之類以配之寅宫尾近中宫故為虎之本象箕居其旁則取豹為虎之類以配之丑宫牛近中宫故為牛之本象斗居其旁則取獬為牛之類以配之亥宫室近中宫故為豬之本象壁居其旁則取􅸃為豬之類以配之戌宫婁近中宫故為狗之本象奎居其旁則取狼為狗之類以配之申宫觜近中宫故為猴之本象參居其旁則取猿為猴之類以配之未宫鬼近中宫故為羊之本象井居其旁則取犴為羊之類以配之巳宫翼近中宫故為蛇之本象軫居其旁則取蚓為蛇之類以配之也其分配七曜擇日用之並見五卷五虎遁從寅算起以五陽干配五寅位故為五虎甲巳之年丙作首乙庚之嵗戊為頭丙辛更向庚寅起丁壬壬位順行流戊癸年從何處起甲寅之上好推求按上古厯元年月日時皆起於甲子是甲子年必甲子月為年前冬至十一月也而正月建寅故得丙寅二月丁卯以次順數至次年正月得戊寅故乙年正月起戊寅從甲至巳越五年共六十月花甲週而復始故正月亦為丙寅即甲與巳合之義五鼠遁從子算起以五陽干配五子位故名五鼠甲巳還加甲乙庚丙作初丙辛從戊起丁壬庚子居戊癸尋壬子時元定不虚按甲子日起甲子時從甲子順數至次日子時得丙子故乙日起丙子從甲至巳越五日共六十時花甲週而復始故子時亦為甲子也三合申子辰合水局亥卯未合木局寅午戌合火局巳酉丑合金局按三合者取生旺庫三者以合局也如水生於申旺於子墓於辰故申子辰合水局也木生於亥旺於卯墓於未故亥卯未合木局也火生於寅旺於午墓於戌故寅午戌合火局也金生於巳旺於酉墓於丑故己酉丑合金局也五合甲與己合乙與庚合丙與辛合丁與壬合戊與癸合按五合者即五位相得而各有合也河圖一與六二與七三與八四與九五與十皆各有合以十干之次言之第一為甲第六為巳故甲與巳合二為乙七為庚故乙與庚合三為丙八為辛故丙與辛合四為丁九為壬故丁與壬合五為戊十為癸故戊與癸合其一三五七九奇也二四六八十偶也故甲丙戊庚壬屬陽乙丁巳辛癸屬隂六合子與丑合寅與亥合卯與戌合辰與酉合巳與申合午與未合按六合者以月建與月將為相合也如正月建寅月將在亥故寅與亥合二月建卯月將在戌故卯與戌合也月建從天道而左旋月將從日行而右轉順逆相値故為六合御定星厯考原卷一
